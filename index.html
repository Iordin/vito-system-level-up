    <meta name="apple-mobile-web-app-capable" content="yes">

        :root {
            --bg: #0a0a0f;
            --surface: #111118;
            --surface2: #181820;
            --neon: #00ccff;
            --neon-dim: #006688;
            --gold: #d4af37;
            --danger: #ff3355;
            --success: #00e676;
            --text: #e0e0e0;
            --text-dim: #888;
            --radius: 12px;
            --glow: 0 0 15px rgba(0, 204, 255, 0.3);
            --glow-gold: 0 0 20px rgba(212, 175, 55, 0.4);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: var(--bg);
            background-image: radial-gradient(ellipse at center, #111118 0%, #0a0a0f 100%);
            color: var(--text);
            font-family: 'Vazirmatn', 'Tahoma', sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            user-select: none;
            -webkit-user-select: none;
            overflow-x: hidden;
        }
        .app-container {
            width: 100%;
            max-width: 480px;
            position: relative;
        }
        .panel {
            background: var(--surface);
            border: 1px solid rgba(0, 204, 255, 0.25);
            border-radius: var(--radius);
            padding: 18px;
            margin-bottom: 12px;
            box-shadow: var(--glow);
            position: relative;
            transition: border-color 0.3s;
        }
        .panel.gold {
            border-color: rgba(212, 175, 55, 0.4);
            box-shadow: var(--glow-gold);
        }
        .panel-header {
            font-size: 13px;
            color: var(--neon);
            letter-spacing: 2px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .panel-header::before {
            content: '▸';
            font-size: 10px;
        }
        #entry-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 30px 0;
        }
        .logo-text {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 6px;
            color: var(--neon);
            text-shadow: 0 0 30px rgba(0, 204, 255, 0.8), 0 0 60px rgba(0, 204, 255, 0.4);
            animation: logoPulse 2s infinite;
        }
        @keyframes logoPulse {
            0%,
            100% {
                text-shadow: 0 0 30px rgba(0, 204, 255, 0.8), 0 0 60px rgba(0, 204, 255, 0.4);
            }
            50% {
                text-shadow: 0 0 50px rgba(0, 204, 255, 1), 0 0 100px rgba(0, 204, 255, 0.7);
            }
        }
        .btn {
            background: var(--surface2);
            border: 1px solid rgba(0, 204, 255, 0.4);
            color: var(--neon);
            padding: 14px 30px;
            border-radius: 30px;
            font-size: 16px;
            font-family: 'Vazirmatn', sans-serif;
            cursor: pointer;
            width: 100%;
            max-width: 300px;
            transition: all 0.3s;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn:hover,
        .btn:active {
            background: var(--neon-dim);
            border-color: var(--neon);
            box-shadow: 0 0 25px rgba(0, 204, 255, 0.5);
            color: #fff;
        }
        .btn.gold-btn {
            border-color: rgba(212, 175, 55, 0.6);
            color: var(--gold);
        }
        .btn.gold-btn:hover {
            border-color: var(--gold);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.5);
        }
        .xp-bar {
            width: 100%;
            height: 8px;
            background: var(--surface2);
            border-radius: 10px;
            overflow: hidden;
            margin: 6px 0;
        }
        .xp-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-dim), var(--neon));
            border-radius: 10px;
            transition: width 0.5s;
            box-shadow: 0 0 8px var(--neon);
        }
        .stats-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 10px 0;
        }
        .stat-chip {
            background: var(--surface2);
            border: 1px solid rgba(0, 204, 255, 0.2);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            white-space: nowrap;
        }
        .stat-val {
            color: var(--neon);
            font-weight: bold;
            margin: 0 4px;
        }
        .vito-axis {

            align-items: center;
            gap: 8px;
            font-size: 12px;
        }
        .vito-axis .label {
            width: 80px;
            text-align: left;
        }
        .vito-axis .bar {
            flex: 1;
            height: 6px;
            background: var(--surface2);
            border-radius: 6px;

        }
        .vito-axis .fill {

            background: var(--gold);
            border-radius: 6px;

            align-items: center;
            cursor: pointer;
            padding: 8px 0;
            border-top: 1px solid rgba(0, 204, 255, 0.15);
            margin-top: 6px;
            user-select: none;
        }
        .collapsible-header .arrow {
            transition: transform 0.3s;
            color: var(--neon);
        }
        .collapsible-header.open .arrow {

        }
        .collapsible-body {

            padding: 6px 0 12px;
        }

        }
        .quest-item {

            border-radius: 6px;

            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            animation: fadeInOverlay 0.5s;

            text-align: center;

        #awakening-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10001;
        }
        .particle {

            width: 4px;
            height: 4px;
            background: var(--gold);
            border-radius: 50%;
            animation: particleFloat 3s ease-out forwards;

        @keyframes particleFloat {
            0% {
                opacity: 1;
                transform: translateY(0) translateX(0) scale(1);

            100% {
                opacity: 0;
                transform: translateY(-400px) translateX(var(--dx)) scale(0);
            }

        @keyframes fadeInOverlay {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }

        @keyframes goldPulse {
            0%,
            100% {

            50% {

            0%,
            100% {

            }
            50% {

            }

        .penalty-shake {
            animation: penaltyShake 0.5s ease;
        }
        @keyframes penaltyShake {
            0%,
            100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-10px);
            }
            50% {
                transform: translateX(10px);
            }
            75% {
                transform: translateX(-5px);
            }
        }
        .xp-float {
            position: fixed;
            color: var(--neon);
            font-weight: bold;
            font-size: 18px;
            pointer-events: none;
            z-index: 9998;
            animation: xpFloatUp 1.5s ease-out forwards;
        }
        @keyframes xpFloatUp {
            0% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-80px);
            }
        }

            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--surface);
            border: 2px solid var(--gold);
            border-radius: var(--radius);
            padding: 20px;
            z-index: 10002;
            text-align: center;
            box-shadow: var(--glow-gold);
            animation: popIn 0.5s ease;
        }
        .achievement-popup h3 {
            color: var(--gold);
            margin-bottom: 8px;
        }
        .achievement-popup .ach-name {
            font-size: 18px;
            color: #fff;
        }
        @keyframes popIn {
            0% {
                transform: translate(-50%, -50%) scale(0);
            }
            70% {
                transform: translate(-50%, -50%) scale(1.1);
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
            }
        }
        .toast-container {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .toast {
            background: var(--surface);
            border: 1px solid var(--neon);
            color: var(--neon);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
            box-shadow: var(--glow);
            animation: toastIn 0.4s ease, toastOut 0.4s ease 3s forwards;
            pointer-events: auto;
        }
        .toast.danger {
            border-color: var(--danger);
            color: var(--danger);
            box-shadow: 0 0 15px rgba(255, 50, 80, 0.4);
        }
        .toast.gold {
            border-color: var(--gold);
            color: var(--gold);
            box-shadow: var(--glow-gold);

            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes toastOut {
            to {
                opacity: 0;
                transform: translateY(-10px);
            }
        }
    </style>
</head>

        const AudioCtx = window.AudioContext || window.webkitAudioContext;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioCtx();
        }

        function playSound(freq, type, duration, vol = 0.1) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + duration);
        }

        // ======================== STATE ========================
        const STORAGE_KEY = 'vito_system';
        let state = {
            user: { name: '', confirmedProfession: '', detectedProfession: '', level: 1, xp: 0, awakeningLevel: 0,
                professionLevel: 0, title: '' },
            stats: { power: 0, speed: 0, endurance: 0, knowledge: 0, spirit: 0 },
            vito: { finance: 0, mentalHealth: 0, physicalHealth: 0, mindset: 0, science: 0 },
            quests: [],
            skills: [],
            history: [],
            lastOpened: '',
            streak: 0,
            achievements: [],
            titlesUnlocked: [],
            prevLevel: 1,
            totalQuestCompletions: {}
        };

        function loadState() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) {
                try { const parsed = JSON.parse(raw);
                    state = deepMerge(state, parsed); } catch (e) {}
            }
            if (!state.quests.length) state.quests = JSON.parse(JSON.stringify(DEFAULT_QUESTS));
            if (!state.totalQuestCompletions) state.totalQuestCompletions = {};
            state.prevLevel = state.user.level;
        }

        function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

        function deepMerge(target, source) {
            const out = { ...target };
            for (const key in source) {
                if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key])) out[key] = deepMerge(
                    target[key] || {}, source[key]);
                else out[key] = source[key];
            }
            return out;
        }

        // ======================== HELPERS ========================
        function getTodayJalali() {
            const d = new Date();
            const formatter = new Intl.DateTimeFormat('fa-IR-u-ca-persian', { year: 'numeric', month: '2-digit',
                day: '2-digit', timeZone: 'Asia/Tehran' });
            return formatter.format(d).replace(/[\/]/g, '-');
        }

        function getDayType(dateStr) {
            const parts = dateStr.split('-');
            const jd = jalaliToGregorian(parseInt(parts[0]), parseInt(parts[1]), parseInt(parts[2]));
            const dow = jd.getDay();
            const persianDow = (dow + 1) % 7;
            if (persianDow === 6) return 'friday';
            return (persianDow % 2 === 0) ? 'even' : 'odd';
        }

        function jalaliToGregorian(jy, jm, jd) {
            const jy2 = jy - 979;
            const days = jd + (jm <= 7 ? (jm - 1) * 31 : (jm - 1) * 30 + 6) + Math.floor((jy2 * 365.25)) - 79;
            const g = new Date(2000, 0, 1);
            g.setDate(g.getDate() + days);
            return g;
        }

        function getRank(level) {
            if (level >= 70) return 'S';
            if (level >= 50) return 'A';
            if (level >= 35) return 'B';
            if (level >= 20) return 'C';
            if (level >= 10) return 'D';
            return 'E';
        }

        function xpForLevel(lvl) { return Math.floor(100 * Math.pow(lvl, 1.3)); }

        function xpForNextLevel() { return xpForLevel(state.user.level + 1); }

        function professionLevelName(lvl) {
            if (lvl >= 100) return 'قهرمان بلامنازع';
            if (lvl >= 80) return 'ملی';
            if (lvl >= 60) return 'حرفه‌ای';
            if (lvl >= 40) return 'آماتور';
            if (lvl >= 20) return 'مبتدی';
            return 'نوآموز';
        }

        function getTopStats(count = 2) {
            return Object.entries(state.stats).sort((a, b) => b[1] - a[1]).slice(0, count).map(e => e[0]);
        }

        function getConsecutiveQuestStreak(questId) {
            const q = state.quests.find(q => q.id === questId);
            return q ? q.streak || 0 : 0;
        }

        function getQuestTotalCompletions(questId) {
            return state.totalQuestCompletions[questId] || 0;
        }

        function getTotalStudyHours() {
            let total = 0;
            state.history.forEach(h => {
                const q = state.quests.find(q => q.id === 'study');
                if (q && h.completedAll) total += q.hoursDone || 0;
            });
            return total;
        }

        function getTotalPenaltyDays() {
            return state.history.filter(h => h.penalty > 0).length;
        }

        function isMonsterDay() {
            const today = getDayType(getTodayJalali());
            const required = state.quests.filter(q => q.days === 'all' || q.days === today);
            return required.length > 0 && required.every(q => q.completed || (q.hoursTarget && q.hoursDone >= q
                .hoursTarget));
        }

        function getConsecutiveMonsterDays() {
            let count = 0;
            for (let i = state.history.length - 1; i >= 0; i--) {
                if (state.history[i].completedAll) count++;
                else break;
            }
            return count;
        }

        function getConsecutiveColdSunriseDays() {
            let count = 0;
            for (let i = state.history.length - 1; i >= 0; i--) {
                if (state.history[i].coldSunrise) count++;
                else break;
            }
            return count;
        }

        function isQuestDoneToday(questId) {
            const q = state.quests.find(q => q.id === questId);
            return q ? q.completed : false;
        }

        function allQuestsDoneToday() {
            const today = getDayType(getTodayJalali());
            const required = state.quests.filter(q => q.days === 'all' || q.days === today);
            return required.length > 0 && required.every(q => q.completed || (q.hoursTarget && q.hoursDone >= q
                .hoursTarget));
        }

        // ======================== DAILY ROLLOVER ========================
        function checkDailyRollover() {
            const today = getTodayJalali();
            if (state.lastOpened === today) return;
            if (state.lastOpened) {
                const missedDays = getMissedDays(state.lastOpened, today);
                missedDays.forEach(day => evaluateDay(day));
            }
            state.lastOpened = today;
            resetTodayQuests();
            saveState();
            render();
        }

        function getMissedDays(from, to) {
            const days = [];
            const start = parseJalali(from);
            const end = parseJalali(to);
            let current = new Date(start);
            while (current < end) {
                current.setDate(current.getDate() + 1);
                days.push(gregorianToJalali(current));
            }
            return days;
        }

        function parseJalali(dateStr) {
            const p = dateStr.split('-');
            return jalaliToGregorian(parseInt(p[0]), parseInt(p[1]), parseInt(p[2]));
        }

        function gregorianToJalali(gdate) {
            const f = new Intl.DateTimeFormat('fa-IR-u-ca-persian', { year: 'numeric', month: '2-digit', day: '2-digit',
                timeZone: 'Asia/Tehran' });
            return f.format(gdate).replace(/[\/]/g, '-');
        }

        function evaluateDay(dateStr) {
            const dayType = getDayType(dateStr);
            if (dayType === 'friday') return;
            const required = state.quests.filter(q => q.days === 'all' || q.days === dayType);
            const allDone = required.length > 0 && required.every(q => q.completed || (q.hoursTarget && q.hoursDone >= q
                .hoursTarget));
            if (allDone) {
                state.streak++;
                const xpGained = required.reduce((s, q) => s + (q.hoursTarget ? q.xp * (q.hoursDone || 0) : q.xp), 0);
                state.history.push({ date: dateStr, completedAll: true, xpGained, penalty: 0, streak: state.streak,
                    coldSunrise: isQuestDoneToday('cold_shower') && isQuestDoneToday('sunlight') });
            } else if (required.length > 0) {
                const penaltyXP = Math.max(20, Math.floor(required.reduce((s, q) => s + q.xp, 0) * 0.4));
                state.user.xp -= penaltyXP;
                while (state.user.xp < 0 && state.user.level > 1) { state.user.level--;
                    state.user.xp += xpForLevel(state.user.level + 1); }
                if (state.user.xp < 0) state.user.xp = 0;
                if (state.user.level < 1) state.user.level = 1;
                state.streak = 0;
                state.history.push({ date: dateStr, completedAll: false, xpGained: 0, penalty: penaltyXP,
                    streak: 0 });
                showToast(`⚠️ پنالتی! ${penaltyXP} XP کم شد.`, 'danger');
                sfxPenalty();
                document.getElementById('status-panel')?.classList.add('penalty-shake');
                setTimeout(() => document.getElementById('status-panel')?.classList.remove('penalty-shake'),
                500);
            }
            saveState();
        }

        function resetTodayQuests() {
            state.quests.forEach(q => { q.completed = false; if (q.hoursDone !== undefined) q.hoursDone = 0; });
        }

        // ======================== GAMEPLAY ========================
        function completeQuest(questId) {
            initAudio();
            const q = state.quests.find(q => q.id === questId);
            if (!q) return;
            q.completed = !q.completed;
            if (q.hoursTarget !== undefined && q.completed) {
                q.completed = (q.hoursDone || 0) >= q.hoursTarget;
                if (!q.completed) return;
            }
            const xp = q.hoursTarget ? q.xp * (q.hoursDone || 0) : q.xp;
            if (q.completed) {
                addXP(xp);
                if (q.stat) state.stats[q.stat] += 1;
                if (q.vito) q.vito.forEach(v => state.vito[v] = Math.min(100, state.vito[v] + Math.ceil(xp / 150)));
                q.streak = (q.streak || 0) + 1;
                state.totalQuestCompletions[q.id] = (state.totalQuestCompletions[q.id] || 0) + 1;
                sfxQuestComplete();
                showToast(`✅ ${q.name} — +${xp} XP`, '');
            } else {
                addXP(-xp);
                if (q.stat) state.stats[q.stat] = Math.max(0, state.stats[q.stat] - 1);
                q.streak = 0;
            }
            checkAchievements();
            saveState();
            detectProfession();
            updateTitle();
            render();
        }

        function addStudyHour(questId, delta) {
            initAudio();
            const q = state.quests.find(q => q.id === questId);
            if (!q || q.hoursTarget === undefined) return;
            q.hoursDone = Math.max(0, Math.min(q.maxHours || 10, (q.hoursDone || 0) + delta));
            q.completed = q.hoursDone >= q.hoursTarget;
            if (q.completed && delta > 0) {
                const xp = q.xp * q.hoursDone;
                addXP(xp);
                if (q.stat) state.stats[q.stat] += Math.floor(q.hoursDone / 2);
                if (q.vito) q.vito.forEach(v => state.vito[v] = Math.min(100, state.vito[v] + Math.ceil(xp / 150)));
                q.streak = (q.streak || 0) + 1;
                state.totalQuestCompletions[q.id] = (state.totalQuestCompletions[q.id] || 0) + 1;
                sfxQuestComplete();
            }
            checkAchievements();
            saveState();
            detectProfession();
            updateTitle();
            render();
        }

        function addXP(amount) {
            if (amount > 0) {
                const awakeningBonus = state.user.awakeningLevel * 0.05;
                if (awakeningBonus > 0) amount += Math.floor(amount * awakeningBonus);
            }
            state.user.xp += amount;
            let leveledUp = false;
            while (state.user.xp >= xpForNextLevel() && state.user.level < 10000) {
                state.user.xp -= xpForNextLevel();
                state.user.level++;
                state.user.professionLevel = Math.floor(state.user.level / 20);
                leveledUp = true;
            }
            while (state.user.xp < 0 && state.user.level > 1) { state.user.level--;
                state.user.xp += xpForLevel(state.user.level + 1); }
            if (state.user.xp < 0) state.user.xp = 0;
            if (state.user.level < 1) state.user.level = 1;
            if (leveledUp) {
                checkAwakening();
                sfxLevelUp();
                if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 200]);
                const panel = document.getElementById('status-panel');
                if (panel) { panel.classList.add('level-up-flash');
                    setTimeout(() => panel.classList.remove('level-up-flash'), 800); }
                showToast(`🎉 سطح ${state.user.level}! لِوِل آپ!`, 'gold');
            }
            if (amount > 0 && !leveledUp) spawnXPFloats(amount);
        }

        function checkAwakening() {
            const milestones = [10, 25, 50, 75, 100];
            const idx = milestones.indexOf(state.user.level);
            if (idx >= 0 && state.user.awakeningLevel < idx + 1) {
                state.user.awakeningLevel = idx + 1;
                sfxAwakening();
                spawnAwakeningParticles();
                const overlay = document.getElementById('awakening-overlay');
                const text = document.getElementById('awakening-text');
                text.textContent = '⚡ بیدار شدی...';
                overlay.style.display = 'flex';
                setTimeout(() => { overlay.style.display = 'none'; }, 3500);
                showToast(`⚡ بیداری! بونوس XP دائمی: ${state.user.awakeningLevel * 5}%`, 'gold');
            }
        }

        function detectProfession() {
            const allKeywords = [];
            state.quests.forEach(q => { if (q.keywords) allKeywords.push(...q.keywords); });
            state.skills.forEach(s => { if (s.name) allKeywords.push(s.name); });
            const topStats = getTopStats();
            const topVito = Object.entries(state.vito).sort((a, b) => b[1] - a[1]).slice(0, 2).map(e => e[0]);
            PROFESSION_DB.forEach(p => p.weight = 0);
            PROFESSION_DB.forEach(p => {
                p.keywords.forEach(kw => { if (allKeywords.some(ak => ak.includes(kw) || kw.includes(ak))) p
                        .weight += 3; });
                p.stats.forEach(s => { if (topStats.includes(s)) p.weight += 2; });
                p.vito.forEach(v => { if (topVito.includes(v)) p.weight += 1; });
            });
            PROFESSION_DB.sort((a, b) => b.weight - a.weight);
            const best = PROFESSION_DB[0];
            if (best && best.weight >= 3) {
                state.user.detectedProfession = best.name;
                if (!state.user.confirmedProfession) state.user.confirmedProfession = best.name;
            }
        }

        function updateTitle() {
            const topTwo = getTopStats();
            const maxStat = state.stats[topTwo[0]] || 0;
            const minStat = Math.min(...Object.values(state.stats));
            if (minStat >= 60) { state.user.title = 'مونارک'; return; }
            if (maxStat < 30) { state.user.title = 'بی‌عنوان — تازه‌کار'; return; }
            const comboKey = [...topTwo].sort().join('+');
            const candidates = MYTH_TITLES.filter(t => t.combo === comboKey || t.combo.includes(comboKey) || t.combo ===
                'all_high');
            if (candidates.length > 0) {
                const allTitles = candidates.flatMap(c => c.titles);
                const dayIndex = new Date().getDate() % allTitles.length;
                state.user.title = allTitles[dayIndex];
            }
        }

        // ======================== ACHIEVEMENTS ========================
        function checkAchievements() {
            ACHIEVEMENTS.forEach(ach => {
                if (!state.achievements.includes(ach.id) && ach.check()) {
                    state.achievements.push(ach.id);
                    if (ach.reward.xp) addXP(ach.reward.xp);
                    if (ach.reward.stats) Object.entries(ach.reward.stats).forEach(([s, v]) => state.stats[
                        s] += v);
                    sfxAchievement();
                    showAchievementPopup(ach.name);
                    showToast(`🏆 Achievement مخفی: ${ach.name}!`, 'gold');
                    saveState();
                }
            });
        }

        function showAchievementPopup(name) {
            const popup = document.createElement('div');
            popup.className = 'achievement-popup';
            popup.innerHTML = `<h3>🏆 Achievement مخفی کشف شد!</h3><div class="ach-name">${name}</div>`;
            document.body.appendChild(popup);
            setTimeout(() => popup.remove(), 3000);
        }

        // ======================== SKILLS ========================
        function addSkill() {
            const name = prompt('نام مهارت جدید:');
            if (!name) return;
            const unit = prompt('واحد پیشرفت (مثلاً واژه، ساعت، جلسه):') || 'جلسه';
            const xpPerUnit = parseInt(prompt('XP هر واحد:')) || 10;
            state.skills.push({ id: 'sk_' + Date.now(), name, unit, xpPerUnit, level: 1, xp: 0, tasks: [],
                streak: 0 });
            saveState();
            render();
        }

        function logSkillProgress(skillId) {
            const sk = state.skills.find(s => s.id === skillId);
            if (!sk) return;
            const amount = parseInt(prompt(`چقدر ${sk.unit} انجام دادی؟`)) || 0;
            if (amount <= 0) return;
            const earnedXP = amount * sk.xpPerUnit;
            sk.xp += earnedXP;
            while (sk.xp >= xpForLevel(sk.level)) { sk.xp -= xpForLevel(sk.level);
                sk.level++; }
            addXP(Math.floor(earnedXP * 0.3));
            saveState();
            detectProfession();
            updateTitle();
            render();
            showToast(`🎓 ${sk.name}: +${earnedXP} XP (سطح ${sk.level})`, '');
        }

        // ======================== VISUAL EFFECTS ========================
        function spawnXPFloats(amount) {
            const container = document.body;
            for (let i = 0; i < 3; i++) {
                const el = document.createElement('div');
                el.className = 'xp-float';
                el.textContent = `+${amount}`;
                el.style.left = (30 + Math.random() * 60) + '%';
                el.style.top = (40 + Math.random() * 10) + '%';
                el.style.animationDuration = (1 + Math.random()) + 's';
                container.appendChild(el);
                setTimeout(() => el.remove(), 2000);
            }
        }

        function spawnAwakeningParticles() {
            const container = document.getElementById('awakening-particles');
            for (let i = 0; i < 80; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.top = (60 + Math.random() * 40) + '%';
                p.style.setProperty('--dx', (Math.random() - 0.5) * 200 + 'px');
                p.style.animationDuration = (2 + Math.random() * 3) + 's';
                p.style.animationDelay = Math.random() * 1.5 + 's';
                container.appendChild(p);
                setTimeout(() => p.remove(), 5000);
            }
        }

        // ======================== NOTIFICATIONS ========================
        function checkNotifications() {
            const now = new Date();
            const tehranTime = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Tehran' }));
            const hours = String(tehranTime.getHours()).padStart(2, '0');
            const minutes = String(tehranTime.getMinutes()).padStart(2, '0');
            const currentTime = `${hours}:${minutes}`;
            const today = getDayType(getTodayJalali());
            state.quests.forEach(q => {
                if (q.notifyTime && q.notifyTime === currentTime && !q.completed && (q.days === 'all' || q
                        .days === today) && q._notified !== currentTime) {
                    q._notified = currentTime;
                    showToast(`🔔 ${q.name} — همین الان!`, '');
                    if (Notification.permission === 'granted') new Notification('سیستم ویتو', { body: `⏰ ${q.name}`,
                        icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🗡️</text></svg>' });
                }
            });
            const dayOfWeek = tehranTime.getDay();
            if (hours === '08' && minutes === '00') showToast('✨ صبح بخیر قهرمان! امروز رو بساز.', '');
            if (hours === '22' && minutes === '00' && state.streak > 0) showToast(
                `🔥 استریک ${state.streak} روزه‌ات رو حفظ کن!`, '');
            if (dayOfWeek === 5 && hours === '12' && minutes === '00') showToast('🎉 آخر هفته‌ست — مرور کن ببین کجایی!',
                '');
            if (state.streak > 0 && state.streak % 10 === 0 && hours === '09' && minutes === '00' && state._streakNotified !==
                state.streak) {
                state._streakNotified = state.streak;
                showToast(`🏆 ${state.streak} روز استریک! ادامه بده...`, 'gold');
            }
        }

        function showToast(msg, type) {
            const container = document.getElementById('toasts');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        }

        // ======================== RENDER ========================
        function render() {
            const app = document.getElementById('app');
            const today = getTodayJalali();
            const dayType = getDayType(today);
            const dayLabel = dayType === 'friday' ? 'جمعه (استراحت)' : dayType === 'even' ? 'روز زوج (بوکس)' :
                'روز فرد (قدرتی)';
            const nextXP = xpForNextLevel();
            const xpProgress = nextXP > 0 ? Math.floor((state.user.xp / nextXP) * 100) : 100;
            const rank = getRank(state.user.level);
            const vitoOverall = Math.floor(Object.values(state.vito).reduce((s, v) => s + v, 0) / 5);

            app.innerHTML = `
            <div id="entry-screen" ${state.user.name ? 'style="display:none"' : ''}>
              <div class="logo-text">[SYSTEM]</div>
              <div style="color:var(--text-dim);margin-bottom:10px;">به سیستم خوش آمدی، قهرمان</div>
              <input type="text" id="name-input" placeholder="نام خود را وارد کن..." style="width:100%;max-width:300px;padding:12px;border-radius:25px;border:1px solid var(--neon-dim);background:var(--surface2);color:#fff;text-align:center;font-family:Vazirmatn;font-size:16px;">
              <button class="btn" onclick="saveName()">ورود به سیستم</button>
              <button class="btn gold-btn" onclick="showCreator()">🧬 سازنده</button>
            </div>

            <div id="main-screen" style="display:${state.user.name ? 'block' : 'none'}">
              <div class="panel" id="status-panel">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                  <div>
                    <span style="color:var(--neon);font-weight:bold;">${state.user.name || 'قهرمان'}</span>
                    <span style="font-size:10px;color:var(--text-dim);margin-right:8px;">${professionLevelName(state.user.professionLevel || 0)} ${state.user.confirmedProfession || ''}</span>
                  </div>
                  <span style="color:var(--gold);font-size:12px;">رتبه ${rank}</span>
                </div>
                <div style="font-size:10px;color:var(--gold);margin:2px 0;">${state.user.title || ''}</div>
                <div style="font-size:24px;font-weight:900;color:var(--neon);margin:6px 0;">سطح ${state.user.level}</div>
                <div class="xp-bar"><div class="xp-fill" style="width:${xpProgress}%"></div></div>
                <div style="font-size:10px;color:var(--text-dim);">${state.user.xp} / ${nextXP} XP ${state.user.awakeningLevel>0?`(+${state.user.awakeningLevel*5}% بونوس)` : ''}</div>
                <div class="stats-row">
                  <span class="stat-chip">💪 قدرت <span class="stat-val">${state.stats.power}</span></span>
                  <span class="stat-chip">⚡ سرعت <span class="stat-val">${state.stats.speed}</span></span>
                  <span class="stat-chip">🛡️ استقامت <span class="stat-val">${state.stats.endurance}</span></span>
                  <span class="stat-chip">📖 دانش <span class="stat-val">${state.stats.knowledge}</span></span>
                  <span class="stat-chip">✨ روحیه <span class="stat-val">${state.stats.spirit}</span></span>
                </div>
              </div>

              <div class="panel gold">
                <div class="panel-header">نسخه ویتو</div>
                ${['💰 مالی','🧘 سلامت ذهن','🏋️ سلامت فیزیکی','🧠 ذهنیت','🔬 علم'].map((label,i)=>{
                  const keys=['finance','mentalHealth','physicalHealth','mindset','science'];
                  const val=state.vito[keys[i]];
                  return `<div class="vito-axis"><span class="label">${label}</span><div class="bar"><div class="fill" style="width:${val}%"></div></div><span style="width:35px;text-align:right;font-size:10px;">${val}%</span></div>`;
                }).join('')}
                <div style="text-align:center;margin-top:6px;font-size:14px;color:var(--gold);">نزدیکی به نسخه ویتو: ${vitoOverall}%</div>
              </div>

              <div class="panel">
                <div style="color:var(--neon);font-size:12px;">📅 ${today} — ${dayLabel}</div>
                <div style="display:flex;gap:10px;margin-top:8px;flex-wrap:wrap;">
                  <span style="color:var(--text-dim);font-size:11px;">🔥 استریک: ${state.streak} روز</span>
                  <span style="color:var(--text-dim);font-size:11px;">🏆 Achievements: ${state.achievements.length}</span>
                </div>
              </div>

              <div class="panel">
                <div class="collapsible-header open" onclick="toggleCollapse(this)">
                  <span>📋 کوئست‌های روزانه</span><span class="arrow">▼</span>
                </div>
                <div class="collapsible-body open">
                  ${state.quests.filter(q=>q.days==='all'||q.days===dayType||dayType==='friday').map(q=>{
                    let xpDisplay = q.hoursTarget!==undefined ? `${q.xp} XP/ساعت` : `${q.xp} XP`;
                    return `<div class="quest-item">
                      <div style="display:flex;align-items:center;gap:6px;flex:1;">
                        <input type="checkbox" class="quest-check" ${q.completed?'checked':''} onchange="completeQuest('${q.id}')" ${dayType==='friday'?'disabled':''}>
                        <span class="${q.completed?'quest-done':''}">${q.name}</span>
                        <span class="quest-xp">${xpDisplay}</span>
                      </div>
                      ${q.hoursTarget!==undefined ? `
                        <div style="display:flex;align-items:center;gap:4px;">
                          <button class="small-btn" onclick="addStudyHour('${q.id}',1)">+</button>
                          <span style="font-size:11px;">${q.hoursDone||0}h</span>
                          <button class="small-btn" onclick="addStudyHour('${q.id}',-1)">-</button>
                        </div>
                      ` : ''}
                      ${q.notifyTime ? `<span class="quest-time">🔔 ${q.notifyTime}</span>` : ''}
                      ${q.streak>0?`<span style="font-size:9px;color:var(--gold);">🔥${q.streak}</span>`:''}
                    </div>`;
                  }).join('')}
                </div>
              </div>

              <div class="panel">
                <div class="collapsible-header" onclick="toggleCollapse(this)">
                  <span>🎓 مهارت‌ها</span><span class="arrow">▼</span>
                </div>
                <div class="collapsible-body">
                  ${state.skills.map(sk=>`
                    <div class="skill-card">
                      <div style="display:flex;justify-content:space-between;">
                        <span>${sk.name}</span><span style="color:var(--neon);">سطح ${sk.level}</span>
                      </div>
                      <div class="skill-bar"><div class="skill-fill" style="width:${Math.min(100,sk.xp/xpForLevel(sk.level)*100)}%"></div></div>
                      <div style="font-size:10px;color:var(--text-dim);">${sk.xp} / ${xpForLevel(sk.level)} XP (${sk.xpPerUnit} XP/${sk.unit})</div>
                      <button class="small-btn" onclick="logSkillProgress('${sk.id}')" style="margin-top:6px;">➕ ثبت ${sk.unit}</button>
                    </div>
                  `).join('') || '<div style="color:var(--text-dim);">هنوز مهارتی ثبت نشده.</div>'}
                  <button class="small-btn" onclick="addSkill()" style="margin-top:8px;">➕ مهارت جدید</button>
                </div>
              </div>

              <div class="panel">
                <div class="collapsible-header" onclick="toggleCollapse(this)">
                  <span>🏆 Achievements (${state.achievements.length})</span><span class="arrow">▼</span>
                </div>
                <div class="collapsible-body">
                  ${state.achievements.length===0 ? '<div style="color:var(--text-dim);">هنوز Achievementای کشف نشده.</div>' :
                    state.achievements.slice(-30).map(id=>{
                      const ach = ACHIEVEMENTS.find(a=>a.id===id);
                      return ach ? `<div style="padding:4px 0;font-size:12px;">🏆 ${ach.name}</div>` : '';
                    }).join('')
                  }
                  ${state.achievements.length>30?`<div style="color:var(--text-dim);font-size:10px;">... و ${state.achievements.length-30} تای دیگر</div>`:''}
                </div>
              </div>

              <div style="display:flex;gap:10px;margin-top:10px;">
                <button class="btn" onclick="showReport()" style="flex:1;">📝 گزارش</button>
                <button class="btn" onclick="showCreator()" style="flex:1;">🧬 سازنده</button>
              </div>
              <div style="margin-top:10px;text-align:center;">
                <button class="small-btn" onclick="exportData()">📥 پشتیبان‌گیری</button>
              </div>
            </div>

            <div id="creator-screen" style="display:none;">
              <div class="panel">
                <div style="color:var(--neon);font-size:16px;margin-bottom:12px;">🧬 سازندگان</div>
                <p style="line-height:1.8;font-size:13px;color:var(--text-dim);">
                  سازندگان: اسطوره سیزیف و اشکر<br>
                  این برنامه با الهام از مانهوا Solo Leveling و ژانرهای غالب در رمان‌های شرق آسیا (کره جنوبی) نوشته شده است.<br>
                  هدف: برنامه‌ریزی منسجم‌تر و هدف‌گرایی بهتر برای رسیدن به قله و نسخه‌ای بهتر از دیروز خود.<br>
                  به امید زندگی خوشحال‌تر!<br>
                  استفاده از این برنامه برای همه رایگان و بدون محدودیت است.<br><br>
                  این برنامه تماماً توسط Claude AI ساخته شده است.
                </p>
                <button class="btn" onclick="goBack()" style="margin-top:15px;">🔙 بازگشت</button>
              </div>
            </div>

            <div id="report-screen" style="display:none;">
              <div class="panel">
                <div style="color:var(--neon);font-size:16px;margin-bottom:12px;">📝 گزارش کلی</div>
                ${state.history.length===0 ? '<p style="color:var(--text-dim);">هنوز گزارشی ثبت نشده.</p>' :
                  state.history.slice(-20).reverse().map(h=>`
                    <div style="padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:12px;">
                      <span>📅 ${h.date}</span>
                      <span style="color:${h.completedAll?'var(--success)':'var(--danger)'};margin-right:10px;">${h.completedAll?'✅ کامل':'⚠️ پنالتی'}</span>
                      ${h.xpGained>0?`<span style="color:var(--neon);">+${h.xpGained} XP</span>`:''}
                      ${h.penalty>0?`<span style="color:var(--danger);">-${h.penalty} XP</span>`:''}
                    </div>
                  `).join('')
                }
                <div style="margin-top:10px;font-size:11px;color:var(--text-dim);">
                  📊 مجموع روزها: ${state.history.length} | 🏆 Achievements: ${state.achievements.length}
                </div>
                <button class="btn" onclick="goBack()" style="margin-top:15px;">🔙 بازگشت</button>
              </div>
            </div>
          `;
        }

        function toggleCollapse(header) {
            header.classList.toggle('open');
            header.nextElementSibling.classList.toggle('open');
        }

        function saveName() {
            const input = document.getElementById('name-input');
            if (input && input.value.trim()) {
                state.user.name = input.value.trim();
                detectProfession();
                updateTitle();
                saveState();
                render();
                showToast('خوش آمدی، ' + state.user.name + '! 🗡️', '');
            }
        }

        function showCreator() {
            document.getElementById('entry-screen').style.display = 'none';
            document.getElementById('main-screen').style.display = 'none';
            document.getElementById('report-screen').style.display = 'none';
            document.getElementById('creator-screen').style.display = 'block';
        }

        function showReport() {
            document.getElementById('entry-screen').style.display = 'none';
            document.getElementById('main-screen').style.display = 'none';
            document.getElementById('report-screen').style.display = 'block';
            document.getElementById('creator-screen').style.display = 'none';
            render();
        }

        function goBack() {
            document.getElementById('entry-screen').style.display = 'none';
            document.getElementById('main-screen').style.display = 'block';
            document.getElementById('report-screen').style.display = 'none';
            document.getElementById('creator-screen').style.display = 'none';
            render();
        }

        function exportData() {
            const json = JSON.stringify(state, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'vito-backup-' + getTodayJalali() + '.json';
            a.click();
            URL.revokeObjectURL(url);
            showToast('📥 پشتیبان‌گیری ذخیره شد!', '');
        }

        // ======================== INIT ========================
        function init() {
            loadState();
            checkDailyRollover();
            updateTitle();
            render();
            setInterval(checkNotifications, 30000);
            checkNotifications();
            if (Notification && Notification.permission === 'default') Notification.requestPermission();
        }

        init();
    </script>
</body>
</html>
