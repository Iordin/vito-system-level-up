<head>

    <title>سیستم ویتو</title>

    <style>
        :root {
            --bg: #0a0a0f; --surface: rgba(10,15,30,0.7); --surface2: #181820;
            --neon: #00ccff; --neon-dim: #006688; --gold: #d4af37; --danger: #ff3355;
            --success: #00e676; --text: #e0e0e0; --text-dim: #888; --radius: 12px;
            --glow: 0 0 15px rgba(0,204,255,0.3); --glow-gold: 0 0 20px rgba(212,175,55,0.4);
            --font-numbers: 'Vazir Code', 'Courier New', monospace;
            --font-headings: 'Vazirmatn', 'Tahoma', sans-serif;
            --font-text: 'Vazirmatn', 'Tahoma', sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            background: var(--bg);
            background-image: radial-gradient(ellipse at center, #111118 0%, #0a0a0f 100%);
            color: var(--text); font-family: var(--font-text);
            min-height: 100vh; min-height: 100dvh;
            display: flex; justify-content: center; align-items: center;
            padding: 10px; user-select: none; -webkit-user-select: none; overflow-x: hidden;
        }
        .app-container { width: 100%; max-width: 480px; position: relative; }
        .panel {
            background: var(--surface); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0,200,255,0.4); border-radius: var(--radius);
            padding: 18px; margin-bottom: 12px;
            box-shadow: 0 0 20px rgba(0,180,255,0.15), inset 0 0 20px rgba(0,180,255,0.05), 0 8px 32px rgba(0,0,0,0.4);
            position: relative; overflow: hidden;
        }
        .panel::after {
            content: ''; position: absolute; top:-50%; left:-50%; width:200%; height:200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(0,200,255,0.08) 0%, transparent 60%);
            pointer-events: none;
        }
        .panel.gold { border-color: rgba(212,175,55,0.4); box-shadow: var(--glow-gold); }
        .panel-header {
            font-family: var(--font-headings); font-weight: 700; font-size: 13px;
            color: var(--neon); letter-spacing: 2px; margin-bottom: 10px;
            display: flex; align-items: center; gap: 6px;
        }
        .panel-header::before { content: '▸'; font-size: 10px; }
        .btn {
            background: var(--surface2); border: 1px solid rgba(0,204,255,0.4);
            color: var(--neon); padding: 14px 30px; border-radius: 30px;
            font-size: 16px; font-family: var(--font-text); cursor: pointer;
            width: 100%; max-width: 300px; transition: all 0.3s; margin-bottom: 12px;
            letter-spacing: 1px; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:hover, .btn:active { background: var(--neon-dim); border-color: var(--neon); box-shadow: 0 0 25px rgba(0,204,255,0.5); color: #fff; }
        .btn.gold-btn { border-color: rgba(212,175,55,0.6); color: var(--gold); }
        .btn.gold-btn:hover { border-color: var(--gold); box-shadow: 0 0 25px rgba(212,175,55,0.5); }
        .small-btn { font-size: 10px; padding: 6px 14px; border-radius: 15px; background: var(--surface2); border: 1px solid rgba(255,255,255,0.2); color: #fff; cursor: pointer; font-family: var(--font-text); }
        .back-btn { background: transparent; border-color: rgba(255,255,255,0.2); color: var(--text-dim); max-width: 200px; padding: 10px 20px; font-size: 13px; }
        .logo-text {
            font-family: var(--font-headings); font-weight: 900; font-size: 28px;
            letter-spacing: 8px; color: var(--neon); text-align: center; width: 100%;
            text-shadow: 0 0 30px rgba(0,204,255,0.8), 0 0 60px rgba(0,204,255,0.4);
            animation: logoPulse 2s infinite; margin-bottom: 20px;
        }
        @keyframes logoPulse { 0%,100% { text-shadow: 0 0 30px rgba(0,204,255,0.8), 0 0 60px rgba(0,204,255,0.4); } 50% { text-shadow: 0 0 50px rgba(0,204,255,1), 0 0 100px rgba(0,204,255,0.7); } }
        .stat-val, .xp-val, .level-num, .quest-xp, .vito-axis span { font-family: var(--font-numbers); font-weight: 400; letter-spacing: 2px; }
                .stats-row { display:flex; flex-wrap:wrap; gap:8px; margin:10px 0; }
        .stat-chip { background:var(--surface2); border:1px solid rgba(0,204,255,0.2); padding:6px 12px; border-radius:20px; font-size:12px; white-space:nowrap; }
        .stat-val { color:var(--neon); font-weight:bold; margin:0 4px; }
        .vito-axis { margin:6px 0; display:flex; align-items:center; gap:8px; font-size:12px; }
        .vito-axis .label { width:80px; text-align:left; }
        .vito-axis .bar { flex:1; height:6px; background:var(--surface2); border-radius:6px; overflow:hidden; }
        .vito-axis .fill { height:100%; background:var(--gold); border-radius:6px; transition:width 0.5s; }
        .collapsible-header { display:flex; justify-content:space-between; align-items:center; cursor:pointer; padding:8px 0; border-top:1px solid rgba(0,204,255,0.15); margin-top:6px; user-select:none; }
        .collapsible-header .arrow { transition:transform 0.3s; color:var(--neon); }
        .collapsible-header.open .arrow { transform:rotate(90deg); }
        .collapsible-body { display:none; padding:6px 0 12px; }
        .collapsible-body.open { display:block; }
        .quest-item { display:flex; align-items:center; justify-content:space-between; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.05); flex-wrap:wrap; gap:6px; }
        .quest-check { width:22px; height:22px; accent-color:var(--neon); transform:scale(1.2); cursor:pointer; }
        .quest-done { text-decoration:line-through; opacity:0.5; }
        .quest-xp { background:var(--neon-dim); color:#fff; padding:2px 8px; border-radius:12px; font-size:10px; }
        .quest-time { font-size:10px; color:var(--text-dim); background:var(--surface2); padding:2px 8px; border-radius:12px; }
        .skill-card { background:var(--surface2); border-radius:var(--radius); padding:12px; margin:8px 0; }
        .skill-bar { height:6px; background:#222; border-radius:6px; overflow:hidden; margin:4px 0; }
        .skill-fill { height:100%; background:var(--neon); border-radius:6px; }
        .toast-container { position:fixed; top:15px; left:50%; transform:translateX(-50%); z-index:9999; display:flex; flex-direction:column; gap:8px; pointer-events:none; }
        .toast { background:var(--surface); border:1px solid var(--neon); color:var(--neon); padding:10px 20px; border-radius:20px; font-size:13px; box-shadow:var(--glow); animation:toastIn 0.4s ease, toastOut 0.4s ease 3s forwards; pointer-events:auto; }
        .toast.danger { border-color:var(--danger); color:var(--danger); box-shadow:0 0 15px rgba(255,50,80,0.4); }
        .toast.gold { border-color:var(--gold); color:var(--gold); box-shadow:var(--glow-gold); }
        @keyframes toastIn { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
        @keyframes toastOut { to { opacity:0; transform:translateY(-10px); } }
        .settings-section { margin-bottom: 20px; }
        .settings-section h3 { font-family: var(--font-headings); font-size: 14px; color: var(--gold); margin-bottom: 10px; border-bottom: 1px solid rgba(212,175,55,0.2); padding-bottom: 5px; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; font-size: 13px; }
        .setting-row select, .setting-row input[type="range"] { background: var(--surface2); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 5px 10px; border-radius: 15px; font-family: var(--font-text); }
        .toggle-switch { position: relative; width: 50px; height: 26px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: 0.3s; border-radius: 26px; }
        .toggle-slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: white; transition: 0.3s; border-radius: 50%; }
        .toggle-switch input:checked + .toggle-slider { background-color: var(--neon); }
        .toggle-switch input:checked + .toggle-slider:before { transform: translateX(24px); }
        #system-break-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100000; display: none; flex-direction: column; justify-content: center; align-items: center; pointer-events: none; }
        #system-break-overlay .glitch-text { font-family: var(--font-numbers); font-size: 18px; color: var(--neon); text-align: center; line-height: 2; letter-spacing: 3px; animation: glitchSkew 0.3s infinite; }
        @keyframes glitchSkew { 0% { transform: skew(0deg); } 25% { transform: skew(2deg); } 50% { transform: skew(-2deg); } 75% { transform: skew(1deg); } 100% { transform: skew(0deg); } }
        #system-break-overlay .gold-final { font-family: var(--font-headings); font-weight: 900; font-size: 26px; color: var(--gold); text-shadow: 0 0 40px var(--gold); text-align: center; animation: goldPulse 2s infinite; display: none; }
        @keyframes goldPulse { 0%,100% { text-shadow: 0 0 40px var(--gold); } 50% { text-shadow: 0 0 80px var(--gold), 0 0 120px #fff; } }
        #system-break-particles { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:100001; display:none; }
        .gold-particle { position: absolute; width: 4px; height: 4px; background: var(--gold); border-radius: 50%; animation: particleRise 4s ease-out forwards; }
        @keyframes particleRise { 0% { opacity:1; transform: translateY(100vh) scale(1); } 100% { opacity:0; transform: translateY(-100px) scale(0); } }
        #entry-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; width: 100%; padding: 20px 0; }
      #entry-screen input { width: 100%; max-width: 300px; padding: 12px; border-radius: 25px; border: 1px solid var(--neon-dim); background: var(--surface2); color: #fff; text-align: center; font-family: Vazirmatn; font-size: 16px; }

}

   /* ========== SOLO LEVELING GLASS PANELS ========== */
:root {
    --panel-bg: rgba(10, 15, 30, 0.45);
    --panel-border: rgba(0, 180, 255, 0.5);
    --panel-glow: 0 0 25px rgba(0, 180, 255, 0.2);
}
.panel {
    background: var(--panel-bg);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid var(--panel-border);
    box-shadow: var(--panel-glow), 0 8px 32px rgba(0, 0, 0, 0.5);
    border-radius: 12px;
}
.panel::before {
    background: none;
}
.panel::after {
    background: radial-gradient(ellipse at 30% 20%, rgba(0, 200, 255, 0.1) 0%, transparent 60%);
}
.panel.gold {
    border-color: rgba(212, 175, 55, 0.5);
    box-shadow: 0 0 25px rgba(212, 175, 55, 0.25), 0 8px 32px rgba(0, 0, 0, 0.5);
}
/* ========== فاز ۱: Core Glass & Atmosphere ========== */

/* --- ۱. متغیرهای پایه‌ای جدید --- */
:root {
    --void-bg: #050510;
    --void-gradient: radial-gradient(ellipse at 50% 30%, #0a0a20 0%, #020208 100%);
    
    --glass-bg: rgba(8, 12, 25, 0.5);
    --glass-blur: 28px;
    --glass-border: rgba(0, 200, 255, 0.35);
    --glass-glow: 0 0 40px rgba(0, 200, 255, 0.12), 0 0 100px rgba(0, 200, 255, 0.05);
    --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.04);
    
    --particle-color: rgba(0, 200, 255, 0.7);
    --scanline-opacity: 0.03;
}

/* --- ۲. پس‌زمینه و فضای اصلی --- */
body {
    background: var(--void-bg);
    background-image: var(--void-gradient);
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 10px;
    overflow-x: hidden;
    position: relative;
}

/* ذرات شناور پس‌زمینه (تمام صفحه) */
body::before {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    background-image: 
        radial-gradient(1px 1px at 10% 20%, var(--particle-color), transparent),
        radial-gradient(1px 1px at 30% 70%, var(--particle-color), transparent),
        radial-gradient(2px 2px at 70% 40%, var(--particle-color), transparent),
        radial-gradient(1px 1px at 85% 15%, var(--particle-color), transparent),
        radial-gradient(1.5px 1.5px at 50% 80%, var(--particle-color), transparent),
        radial-gradient(1px 1px at 15% 85%, rgba(0, 200, 255, 0.4), transparent),
        radial-gradient(2px 2px at 60% 25%, rgba(0, 200, 255, 0.5), transparent);
    background-size: 200% 200%;
    animation: floatParticles 20s linear infinite;
}

@keyframes floatParticles {
    0% { background-position: 0% 0%; opacity: 0.8; }
    50% { background-position: 100% 100%; opacity: 1; }
    100% { background-position: 0% 0%; opacity: 0.8; }
}

/* اسکن‌لاین عمودی (شبیه بوت سیستم) – فقط زمانی که پنجره لود می‌شود */
body::after {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 200, 255, 0.015) 2px,
        rgba(0, 200, 255, 0.015) 4px
    );
    pointer-events: none;
    z-index: 1;
    animation: scanLine 8s linear;
    opacity: 0;
}

@keyframes scanLine {
    0% { opacity: 0.6; transform: translateY(-100%); }
    20% { opacity: 0.3; }
    40% { opacity: 0.6; transform: translateY(100%); }
    100% { opacity: 0; }
}

/* --- ۳. پنل‌های شیشه‌ای اصلی (ارتقاء یافته) --- */
.panel {
    background: var(--glass-bg);
    backdrop-filter: blur(var(--glass-blur));
    -webkit-backdrop-filter: blur(var(--glass-blur));
    border: 1px solid var(--glass-border);
    box-shadow: var(--glass-glow), var(--glass-shadow);
    border-radius: var(--radius, 12px);
    position: relative;
    overflow: hidden;
    z-index: 2;
    transition: border-color 0.3s, box-shadow 0.3s;
}

/* حذف استایل‌های قدیمی شبه‌عنصر و جایگزینی با عمق جدید */
.panel::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(
        ellipse at 30% 20%,
        rgba(0, 200, 255, 0.06) 0%,
        transparent 60%
    );
    pointer-events: none;
    z-index: 0;
}

.panel::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    right: 0; bottom: 0;
    background: linear-gradient(
        135deg,
        rgba(255, 255, 255, 0.03) 0%,
        transparent 50%,
        rgba(0, 200, 255, 0.02) 100%
    );
    pointer-events: none;
    z-index: 1;
}

/* --- ۴. تنظیم پنل طلایی (بدون تغییر در منطق) --- */
.panel.gold {
    border-color: rgba(212, 175, 55, 0.45);
    box-shadow: 0 0 30px rgba(212, 175, 55, 0.15), var(--glass-shadow);
}
.panel.gold::before {
    background: radial-gradient(
        ellipse at 30% 20%,
        rgba(212, 175, 55, 0.08) 0%,
        transparent 60%
    );
}

/* --- ۵. پایه‌ریزی حالت شب (برای فازهای بعدی) --- */
body.night-mode {
    --void-bg: #04030f;
    --void-gradient: radial-gradient(ellipse at 50% 30%, #0d0520 0%, #020105 100%);
    --glass-bg: rgba(15, 10, 30, 0.55);
    --glass-border: rgba(180, 130, 255, 0.35);
    --glass-glow: 0 0 40px rgba(180, 130, 255, 0.12), 0 0 100px rgba(180, 130, 255, 0.05);
    --particle-color: rgba(180, 130, 255, 0.7);
}

body.night-mode .panel {
    border-color: var(--glass-border);
    box-shadow: var(--glass-glow), var(--glass-shadow);
}

body.night-mode .panel::before {
    background: radial-gradient(
        ellipse at 30% 20%,
        rgba(180, 130, 255, 0.06) 0%,
        transparent 60%
    );
}

body.night-mode .panel.gold {
    border-color: rgba(212, 175, 55, 0.4);
    box-shadow: 0 0 30px rgba(212, 175, 55, 0.12), var(--glass-shadow);
}

/* تنظیم اسکن‌لاین برای شب */
body.night-mode::after {
    background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(180, 130, 255, 0.02) 2px,
        rgba(180, 130, 255, 0.02) 4px
    );
}

/* ذرات شب */
body.night-mode::before {
    background-image: 
        radial-gradient(1px 1px at 10% 20%, var(--particle-color), transparent),
        radial-gradient(1px 1px at 30% 70%, var(--particle-color), transparent),
        radial-gradient(2px 2px at 70% 40%, var(--particle-color), transparent),
        radial-gradient(1px 1px at 85% 15%, var(--particle-color), transparent),
        radial-gradient(1.5px 1.5px at 50% 80%, var(--particle-color), transparent),
        radial-gradient(1px 1px at 15% 85%, rgba(180, 130, 255, 0.4), transparent),
        radial-gradient(2px 2px at 60% 25%, rgba(180, 130, 255, 0.5), transparent);
}    
/* ========== فاز ۲: Header & Identity ========== */

/* --- ۱. کانتینر اصلی هدر --- */
.status-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 6px;
}
.status-header-left {
    flex: 1;
}

/* --- ۲. رتبه (Rank Badge) — هگزاگون شیشه‌ای --- */
.rank-badge {
    width: 46px; height: 46px;
    background: var(--panel-bg);
    border: 2px solid var(--glass-border);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-numbers);
    font-weight: 900;
    font-size: 16px;
    color: var(--neon);
    text-shadow: 0 0 10px var(--neon);
    box-shadow: 0 0 20px rgba(0, 200, 255, 0.3), inset 0 0 12px rgba(0, 200, 255, 0.1);
    flex-shrink: 0;
    transition: all 0.3s;
}

/* رنگ‌بندی رتبه‌ها */
.rank-badge.S-rank {
    border-color: #ff3355;
    color: #ff3355;
    text-shadow: 0 0 14px #ff3355;
    box-shadow: 0 0 25px rgba(255, 50, 85, 0.4), inset 0 0 15px rgba(255, 50, 85, 0.15);
}
.rank-badge.A-rank {
    border-color: #ff9800;
    color: #ff9800;
    text-shadow: 0 0 12px #ff9800;
    box-shadow: 0 0 22px rgba(255, 150, 0, 0.35);
}
.rank-badge.B-rank {
    border-color: #d4af37;
    color: #d4af37;
    text-shadow: 0 0 10px #d4af37;
    box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
}
.rank-badge.C-rank {
    border-color: #00e676;
    color: #00e676;
    text-shadow: 0 0 8px #00e676;
}
.rank-badge.D-rank {
    border-color: #888;
    color: #888;
    text-shadow: none;
    box-shadow: 0 0 10px rgba(136, 136, 136, 0.2);
}
.rank-badge.E-rank {
    border-color: #555;
    color: #555;
    text-shadow: none;
    box-shadow: none;
}

/* --- ۳. نام کاربر --- */
.name-title {
    font-family: var(--font-headings);
    font-weight: 700;
    font-size: 17px;
    color: var(--neon);
    text-shadow: 0 0 12px rgba(0, 200, 255, 0.6);
    letter-spacing: 1px;
    line-height: 1.3;
}

/* --- ۴. برچسب حرفه --- */
.profession-tag {
    font-size: 9px;
    color: var(--text-dim);
    background: rgba(0, 200, 255, 0.06);
    padding: 3px 10px;
    border-radius: 4px;
    letter-spacing: 1px;
    border: 1px solid rgba(0, 200, 255, 0.2);
    display: inline-block;
    margin-top: 2px;
}

/* --- ۵. عنوان اساطیری --- */
.myth-title {
    font-family: var(--font-headings);
    font-size: 12px;
    background: linear-gradient(135deg, var(--gold), #fff8e0, var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 1px;
    margin: 4px 0;
    animation: titleShimmer 3s ease-in-out infinite;
}
@keyframes titleShimmer {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.4); }
}

/* --- ۶. شمارهٔ سطح --- */
.level-display {
    font-family: var(--font-numbers);
    font-size: 38px;
    font-weight: 900;

  /* ========== فاز ۵: Quests Timeline & Ripple ========== */
.quest-timeline {
  position: relative;
  padding-right: 24px;
  margin: 8px 0;
}

/* خط عمودی */
.quest-timeline::before {
  content: '';
  position: absolute;
  right: 8px;
  top: 0;
  bottom: 0;
  width: 2px;
  background: linear-gradient(to bottom, var(--neon-dim), var(--neon), var(--neon-dim));
  opacity: 0.4;
  border-radius: 1px;
}

.timeline-entry {
  position: relative;
  display: flex;
  align-items: flex-start;
  margin-bottom: 14px;
}

/* نود (دایره) */
.timeline-node {
  position: absolute;
  right: -16px;  /* تنظیم نسبت به خط */
  top: 12px;
  width: 12px;
  height: 12px;
  background: var(--surface2);
  border: 2px solid var(--neon);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--neon);
  z-index: 2;
  transition: all 0.3s;
}
.timeline-node.completed {
  background: var(--neon);
  box-shadow: 0 0 14px var(--neon);
}

/* کارت شیشه‌ای */
.timeline-card {
  flex: 1;
  background: var(--panel-bg);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(0,200,255,0.25);
  border-radius: 10px;
  padding: 10px 14px;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

/* ripple on hover */
.timeline-card::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  width: 0; height: 0;
  background: radial-gradient(circle, rgba(0,200,255,0.2) 0%, transparent 70%);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  transition: width 0.6s, height 0.6s, opacity 0.6s;
  opacity: 0;
}
.timeline-card:hover::after {
  width: 300px;
  height: 300px;
  opacity: 1;
}
.timeline-card:hover {
  border-color: var(--neon);
  box-shadow: 0 0 20px rgba(0,200,255,0.3);
  transform: translateX(-4px);
}

    while(state.user.xp>=xpForNextLevel()&&state.user.level<100000){ state.user.xp-=xpForNextLevel(); state.user.level++; state.user.professionLevel=Math.floor(state.user.level/20); lu=true; }
    while(state.user.xp<0&&state.user.level>1){ state.user.level--; state.user.xp+=xpForLevel(state.user.level+1); }
    if(state.user.xp<0) state.user.xp=0; if(state.user.level<1) state.user.level=1;
    if(lu){ checkAwakening(); if(settings.vibration) navigator.vibrate?.([100,50,100,50,200]); }
}
function checkAwakening(){ const ms=[10,25,50,75,100]; const idx=ms.indexOf(state.user.level); if(idx>=0&&state.user.awakeningLevel<idx+1){ state.user.awakeningLevel=idx+1; if(settings.sound) sfxAwakening(); } }
function detectProfession(){
    const ak=[]; state.quests.forEach(q=>{ if(q.keywords) ak.push(...q.keywords); }); state.skills.forEach(s=>{ if(s.name) ak.push(s.name); });
    const ts=getTopStats(); const tv=Object.entries(state.vito).sort((a,b)=>b[1]-a[1]).slice(0,2).map(e=>e[0]);
    PROFESSION_DB.forEach(p=>p.weight=0);
    PROFESSION_DB.forEach(p=>{ p.keywords.forEach(kw=>{ if(ak.some(a=>a.includes(kw)||kw.includes(a))) p.weight+=3; }); p.stats.forEach(s=>{ if(ts.includes(s)) p.weight+=2; }); p.vito.forEach(v=>{ if(tv.includes(v)) p.weight+=1; }); });
    PROFESSION_DB.sort((a,b)=>b.weight-a.weight); const best=PROFESSION_DB[0];
    if(best&&best.weight>=3){ state.user.detectedProfession=best.name; if(!state.user.confirmedProfession) state.user.confirmedProfession=best.name; }
}
function updateTitle(){
    const tt=getTopStats(); const mx=state.stats[tt[0]]||0; const mn=Math.min(...Object.values(state.stats));
    if(mn>=60){ state.user.title='مونارک'; return; } if(mx<30){ state.user.title='بی‌عنوان — تازه‌کار'; return; }
    const ck=[...tt].sort().join('+'); const cand=MYTH_TITLES.filter(t=>t.combo===ck||t.combo.includes(ck)||t.combo==='all_high');
    if(cand.length>0){ const all=cand.flatMap(c=>c.titles); state.user.title=all[new Date().getDate()%all.length]; }
}
function checkAchievements(){ ACHIEVEMENTS.forEach(ach=>{ if(!state.achievements.includes(ach.id)&&ach.check()){ state.achievements.push(ach.id); if(ach.reward&&ach.reward.xp) addXP(ach.reward.xp); if(ach.reward&&ach.reward.stats) Object.entries(ach.reward.stats).forEach(([s,v])=>state.stats[s]+=v); if(settings.sound) sfxAchievement(); showToast(`🏆 Achievement مخفی: ${ach.name}!`,'gold'); saveState(); } }); }
function addSkill(){ const n=prompt('نام مهارت جدید:'); if(!n) return; const u=prompt('واحد پیشرفت:')||'جلسه'; const x=parseInt(prompt('XP هر واحد:'))||10; state.skills.push({id:'sk_'+Date.now(),name:n,unit:u,xpPerUnit:x,level:1,xp:0,streak:0}); saveState(); render(); }
function logSkillProgress(sid){ const sk=state.skills.find(s=>s.id===sid); if(!sk) return; const amt=parseInt(prompt(`چقدر ${sk.unit} انجام دادی؟`))||0; if(amt<=0) return; const ex=amt*sk.xpPerUnit; sk.xp+=ex; while(sk.xp>=xpForLevel(sk.level)){ sk.xp-=xpForLevel(sk.level); sk.level++; } addXP(Math.floor(ex*0.3)); saveState(); detectProfession(); updateTitle(); render(); }

function playSound(freq,type,duration,vol=0.1){ if(!audioCtx||!settings.sound) return; const osc=audioCtx.createOscillator(); const gain=audioCtx.createGain(); osc.type=type; osc.frequency.setValueAtTime(freq,audioCtx.currentTime); gain.gain.setValueAtTime(vol,audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+duration); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime+duration); }
function sfxQuestComplete(){ initAudio(); playSound(880,'sine',0.15); playSound(1320,'sine',0.1); }

function saveName(){ const inp=document.getElementById('name-input'); if(inp&&inp.value.trim()){ state.user.name=inp.value.trim(); detectProfession(); updateTitle(); saveState(); render(); } }
function exportData(){ const json=JSON.stringify(state,null,2); const blob=new Blob([json],{type:'application/json'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='vito-backup-'+getTodayJalali()+'.json'; a.click(); URL.revokeObjectURL(url); }
