    <title>سیستم ویتو</title>

    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f; --surface: rgba(10,15,30,0.7); --surface2: #181820;
            --neon: #00ccff; --neon-dim: #006688; --gold: #d4af37; --danger: #ff3355;
            --success: #00e676; --text: #e0e0e0; --text-dim: #888; --radius: 12px;
            --glow: 0 0 15px rgba(0,204,255,0.3); --glow-gold: 0 0 20px rgba(212,175,55,0.4);
            --font-numbers: 'Vazir Code', 'Courier New', monospace;
            --font-headings: 'Vazirmatn', 'Tahoma', sans-serif;
            --font-text: 'Vazirmatn', 'Tahoma', sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            background: var(--bg);
            background-image: radial-gradient(ellipse at center, #111118 0%, #0a0a0f 100%);
            color: var(--text); font-family: var(--font-text);
            min-height: 100vh; min-height: 100dvh;
            display: flex; justify-content: center; align-items: center;
            padding: 10px; user-select: none; -webkit-user-select: none; overflow-x: hidden;
        }
        .app-container { width: 100%; max-width: 480px; position: relative; }
        .panel {
            background: var(--surface); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0,200,255,0.4); border-radius: var(--radius);
            padding: 18px; margin-bottom: 12px;
            box-shadow: 0 0 20px rgba(0,180,255,0.15), inset 0 0 20px rgba(0,180,255,0.05), 0 8px 32px rgba(0,0,0,0.4);
            position: relative; overflow: hidden;
        }
        .panel::before {
            content: ''; position: absolute; top:0; left:0; right:0; bottom:0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,180,255,0.03) 2px, rgba(0,180,255,0.03) 4px),
                        repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0,180,255,0.03) 2px, rgba(0,180,255,0.03) 4px);
            pointer-events: none;
        }
        .panel::after {
            content: ''; position: absolute; top:-50%; left:-50%; width:200%; height:200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(0,200,255,0.08) 0%, transparent 60%);
            pointer-events: none;
        }
        .panel.gold { border-color: rgba(212,175,55,0.4); box-shadow: var(--glow-gold); }
        .panel-header {
            font-family: var(--font-headings); font-weight: 700; font-size: 13px;
            color: var(--neon); letter-spacing: 2px; margin-bottom: 10px;
            display: flex; align-items: center; gap: 6px;
        }
        .panel-header::before { content: '▸'; font-size: 10px; }
        .btn {
            background: var(--surface2); border: 1px solid rgba(0,204,255,0.4);
            color: var(--neon); padding: 14px 30px; border-radius: 30px;
            font-size: 16px; font-family: var(--font-text); cursor: pointer;
            width: 100%; max-width: 300px; transition: all 0.3s; margin-bottom: 12px;
            letter-spacing: 1px; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:hover, .btn:active { background: var(--neon-dim); border-color: var(--neon); box-shadow: 0 0 25px rgba(0,204,255,0.5); color: #fff; }
        .btn.gold-btn { border-color: rgba(212,175,55,0.6); color: var(--gold); }
        .btn.gold-btn:hover { border-color: var(--gold); box-shadow: 0 0 25px rgba(212,175,55,0.5); }
        .small-btn { font-size: 10px; padding: 6px 14px; border-radius: 15px; background: var(--surface2); border: 1px solid rgba(255,255,255,0.2); color: #fff; cursor: pointer; font-family: var(--font-text); }
        .back-btn { background: transparent; border-color: rgba(255,255,255,0.2); color: var(--text-dim); max-width: 200px; padding: 10px 20px; font-size: 13px; }
        .logo-text {
            font-family: var(--font-headings); font-weight: 900; font-size: 28px;
            letter-spacing: 8px; color: var(--neon); text-align: center; width: 100%;
            text-shadow: 0 0 30px rgba(0,204,255,0.8), 0 0 60px rgba(0,204,255,0.4);
            animation: logoPulse 2s infinite; margin-bottom: 20px;
        }
        @keyframes logoPulse { 0%,100% { text-shadow: 0 0 30px rgba(0,204,255,0.8), 0 0 60px rgba(0,204,255,0.4); } 50% { text-shadow: 0 0 50px rgba(0,204,255,1), 0 0 100px rgba(0,204,255,0.7); } }
        .stat-val, .xp-val, .level-num, .quest-xp, .vito-axis span { font-family: var(--font-numbers); font-weight: 400; letter-spacing: 2px; }
        .xp-bar { width:100%; height:8px; background:var(--surface2); border-radius:10px; overflow:hidden; margin:6px 0; }
        .xp-fill { height:100%; background:linear-gradient(90deg, var(--neon-dim), var(--neon)); border-radius:10px; transition: width 0.5s; box-shadow: 0 0 8px var(--neon); }
        .stats-row { display:flex; flex-wrap:wrap; gap:8px; margin:10px 0; }
        .stat-chip { background:var(--surface2); border:1px solid rgba(0,204,255,0.2); padding:6px 12px; border-radius:20px; font-size:12px; white-space:nowrap; }
        .stat-val { color:var(--neon); font-weight:bold; margin:0 4px; }
        .vito-axis { margin:6px 0; display:flex; align-items:center; gap:8px; font-size:12px; }
        .vito-axis .label { width:80px; text-align:left; }
        .vito-axis .bar { flex:1; height:6px; background:var(--surface2); border-radius:6px; overflow:hidden; }
        .vito-axis .fill { height:100%; background:var(--gold); border-radius:6px; transition:width 0.5s; }
        .collapsible-header { display:flex; justify-content:space-between; align-items:center; cursor:pointer; padding:8px 0; border-top:1px solid rgba(0,204,255,0.15); margin-top:6px; user-select:none; }
        .collapsible-header .arrow { transition:transform 0.3s; color:var(--neon); }
        .collapsible-header.open .arrow { transform:rotate(90deg); }
        .collapsible-body { display:none; padding:6px 0 12px; }
        .collapsible-body.open { display:block; }
        .quest-item { display:flex; align-items:center; justify-content:space-between; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.05); flex-wrap:wrap; gap:6px; }
        .quest-check { width:22px; height:22px; accent-color:var(--neon); transform:scale(1.2); cursor:pointer; }
        .quest-done { text-decoration:line-through; opacity:0.5; }
        .quest-xp { background:var(--neon-dim); color:#fff; padding:2px 8px; border-radius:12px; font-size:10px; }
        .quest-time { font-size:10px; color:var(--text-dim); background:var(--surface2); padding:2px 8px; border-radius:12px; }
        .skill-card { background:var(--surface2); border-radius:var(--radius); padding:12px; margin:8px 0; }
        .skill-bar { height:6px; background:#222; border-radius:6px; overflow:hidden; margin:4px 0; }
        .skill-fill { height:100%; background:var(--neon); border-radius:6px; }
        .toast-container { position:fixed; top:15px; left:50%; transform:translateX(-50%); z-index:9999; display:flex; flex-direction:column; gap:8px; pointer-events:none; }
        .toast { background:var(--surface); border:1px solid var(--neon); color:var(--neon); padding:10px 20px; border-radius:20px; font-size:13px; box-shadow:var(--glow); animation:toastIn 0.4s ease, toastOut 0.4s ease 3s forwards; pointer-events:auto; }
        .toast.danger { border-color:var(--danger); color:var(--danger); box-shadow:0 0 15px rgba(255,50,80,0.4); }
        .toast.gold { border-color:var(--gold); color:var(--gold); box-shadow:var(--glow-gold); }
        @keyframes toastIn { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
        @keyframes toastOut { to { opacity:0; transform:translateY(-10px); } }
        .settings-section { margin-bottom: 20px; }
        .settings-section h3 { font-family: var(--font-headings); font-size: 14px; color: var(--gold); margin-bottom: 10px; border-bottom: 1px solid rgba(212,175,55,0.2); padding-bottom: 5px; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; font-size: 13px; }
        .setting-row select, .setting-row input[type="range"] { background: var(--surface2); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 5px 10px; border-radius: 15px; font-family: var(--font-text); }
        .toggle-switch { position: relative; width: 50px; height: 26px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: 0.3s; border-radius: 26px; }
        .toggle-slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: white; transition: 0.3s; border-radius: 50%; }
        .toggle-switch input:checked + .toggle-slider { background-color: var(--neon); }
        .toggle-switch input:checked + .toggle-slider:before { transform: translateX(24px); }
        #system-break-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100000; display: none; flex-direction: column; justify-content: center; align-items: center; pointer-events: none; }
        #system-break-overlay .glitch-text { font-family: var(--font-numbers); font-size: 18px; color: var(--neon); text-align: center; line-height: 2; letter-spacing: 3px; animation: glitchSkew 0.3s infinite; }
        @keyframes glitchSkew { 0% { transform: skew(0deg); } 25% { transform: skew(2deg); } 50% { transform: skew(-2deg); } 75% { transform: skew(1deg); } 100% { transform: skew(0deg); } }
        #system-break-overlay .gold-final { font-family: var(--font-headings); font-weight: 900; font-size: 26px; color: var(--gold); text-shadow: 0 0 40px var(--gold); text-align: center; animation: goldPulse 2s infinite; display: none; }
        @keyframes goldPulse { 0%,100% { text-shadow: 0 0 40px var(--gold); } 50% { text-shadow: 0 0 80px var(--gold), 0 0 120px #fff; } }
        #system-break-particles { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:100001; display:none; }
        .gold-particle { position: absolute; width: 4px; height: 4px; background: var(--gold); border-radius: 50%; animation: particleRise 4s ease-out forwards; }
        @keyframes particleRise { 0% { opacity:1; transform: translateY(100vh) scale(1); } 100% { opacity:0; transform: translateY(-100px) scale(0); } }
        #entry-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; width: 100%; padding: 20px 0; }
      #entry-screen input { width: 100%; max-width: 300px; padding: 12px; border-radius: 25px; border: 1px solid var(--neon-dim); background: var(--surface2); color: #fff; text-align: center; font-family: Vazirmatn; font-size: 16px; }

    --radius: 8px;
}

   /* ========== SOLO LEVELING GLASS PANELS ========== */
:root {

.panel {

}
.panel::before {

}
.panel::after {
    background: radial-gradient(ellipse at 30% 20%, rgba(0, 200, 255, 0.1) 0%, transparent 60%);
}
.panel.gold {
    border-color: rgba(212, 175, 55, 0.5);
    box-shadow: 0 0 25px rgba(212, 175, 55, 0.25), 0 8px 32px rgba(0, 0, 0, 0.5);
}
    </style>

              </div>
              <div class="panel gold"><div class="panel-header">نسخه ویتو</div>${['💰 مالی','🧘 سلامت ذهن','🏋️ سلامت فیزیکی','🧠 ذهنیت','🔬 علم'].map((label,i)=>{const keys=['finance','mentalHealth','physicalHealth','mindset','science'];const val=state.vito[keys[i]];return`<div class="vito-axis"><span class="label">${label}</span><div class="bar"><div class="fill" style="width:${val}%"></div></div><span style="width:35px;text-align:right;font-size:10px;">${val}%</span></div>`;}).join('')}<div style="text-align:center;margin-top:6px;font-size:14px;color:var(--gold);">نزدیکی به نسخه ویتو: ${vitoOverall}%</div></div>
              <div class="panel"><div style="color:var(--neon);font-size:12px;">📅 ${today} — ${dayLabel}</div><div style="display:flex;gap:10px;margin-top:8px;flex-wrap:wrap;"><span style="color:var(--text-dim);font-size:11px;">🔥 استریک: ${state.streak} روز</span><span style="color:var(--text-dim);font-size:11px;">🏆 Achievements: ${state.achievements.length}</span><span style="color:var(--text-dim);font-size:11px;">🛌 روزهای استراحت: ${restRemaining}/${monthlyMax}</span></div><div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;">${restRemaining>0&&!isTodayRestDay()?`<button class="small-btn" onclick="useRestDay();render();">🛌 امروز استراحت</button>`:''}${canUseSickLeave()?`<button class="small-btn" onclick="activateSickLeave(prompt('چند روز؟ (حداکثر ۱۴)')||7);render();">🏥 حالت تعلیق</button>`:''}${state.sickLeaveActive?`<button class="small-btn" onclick="deactivateSickLeave();render();">✅ پایان تعلیق</button>`:''}</div></div>
              <div class="panel"><div class="collapsible-header open" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open');"><span>📋 کوئست‌های روزانه</span><span class="arrow">▼</span></div><div class="collapsible-body open">${state.quests.filter(q=>q.days==='all'||q.days===dayType||dayType==='friday').map(q=>{let xpDisplay=q.hoursTarget!==undefined?`${q.xp} XP/ساعت`:`${q.xp} XP`;return`<div class="quest-item"><div style="display:flex;align-items:center;gap:6px;flex:1;"><input type="checkbox" class="quest-check" ${q.completed?'checked':''} onchange="completeQuest('${q.id}')" ${dayType==='friday'||state.sickLeaveActive?'disabled':''}><span class="${q.completed?'quest-done':''}">${q.name}</span><span class="quest-xp">${xpDisplay}</span></div>${q.hoursTarget!==undefined?`<div style="display:flex;align-items:center;gap:4px;"><button class="small-btn" onclick="addStudyHour('${q.id}',1)">+</button><span style="font-size:11px;">${q.hoursDone||0}h</span><button class="small-btn" onclick="addStudyHour('${q.id}',-1)">-</button></div>`:''}${q.notifyTime?`<span class="quest-time">🔔 ${q.notifyTime}</span>`:''}${q.streak>0?`<span style="font-size:9px;color:var(--gold);">🔥${q.streak}</span>`:''}</div>`;}).join('')}</div></div>
              <div class="panel"><div class="collapsible-header" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open');"><span>🎓 مهارت‌ها</span><span class="arrow">▼</span></div><div class="collapsible-body">${state.skills.map(sk=>`<div class="skill-card"><div style="display:flex;justify-content:space-between;"><span>${sk.name}</span><span style="color:var(--neon);">سطح ${sk.level}</span></div><div class="skill-bar"><div class="skill-fill" style="width:${Math.min(100,sk.xp/xpForLevel(sk.level)*100)}%"></div></div><div style="font-size:10px;color:var(--text-dim);">${sk.xp} / ${xpForLevel(sk.level)} XP (${sk.xpPerUnit} XP/${sk.unit})</div><button class="small-btn" onclick="logSkillProgress('${sk.id}')" style="margin-top:6px;">➕ ثبت ${sk.unit}</button></div>`).join('')||'<div style="color:var(--text-dim);">هنوز مهارتی ثبت نشده.</div>'}<button class="small-btn" onclick="addSkill()" style="margin-top:8px;">➕ مهارت جدید</button></div></div>
              <div class="panel"><div class="collapsible-header" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open');"><span>🏆 Achievements (${state.achievements.length})</span><span class="arrow">▼</span></div><div class="collapsible-body">${state.achievements.length===0?'<div style="color:var(--text-dim);">هنوز Achievementای کشف نشده.</div>':state.achievements.slice(-20).map(id=>{const ach=ACHIEVEMENTS.find(a=>a.id===id);return ach?`<div style="padding:4px 0;font-size:12px;">🏆 ${ach.name}</div>`:'';}).join('')}</div></div>
              <div style="display:flex;gap:10px;margin-top:10px;"><button class="btn" onclick="showReport()" style="flex:1;">📝 گزارش</button><button class="btn" onclick="showCreator()" style="flex:1;">🧬 سازنده</button></div>
            </div>
            <div id="creator-screen" style="display:none;"><div class="panel"><div style="color:var(--neon);font-size:16px;margin-bottom:12px;">🧬 سازندگان</div><p style="line-height:2.2;font-size:14px;color:var(--text-dim);text-align:justify;padding:10px 0;">سازندگان: اسطوره سیزیف و اشکر<br><br>این برنامه با الهام از مانهوا Solo Leveling و ژانرهای غالب در رمان‌های شرق آسیا (کره جنوبی) نوشته شده است.<br><br>هدف از ساخت آن: برنامه‌ریزی منسجم‌تر، هدف‌گرایی بهتر و واضح‌تر برای رسیدن به قله و نسخه‌ای بهتر از دیروز خود.<br><br>استفاده از این برنامه برای همه رایگان و بدون محدودیت است.<br><br>این برنامه تماماً توسط Claude AI ساخته شده است.</p><button class="btn back-btn" onclick="goHome()">🔙 بازگشت</button></div></div>
            <div id="report-screen" style="display:none;"><div class="panel"><div style="color:var(--neon);font-size:16px;margin-bottom:12px;">📝 گزارش کلی</div>${state.history.length===0?'<p style="color:var(--text-dim);">هنوز گزارشی ثبت نشده.</p>':state.history.slice(-20).reverse().map(h=>`<div style="padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:12px;"><span>📅 ${h.date}</span><span style="color:${h.completedAll?'var(--success)':'var(--danger)'};margin-right:10px;">${h.completedAll?'✅ کامل':'⚠️ پنالتی'}</span>${h.xpGained>0?`<span style="color:var(--neon);">+${h.xpGained} XP</span>`:''}${h.penalty>0?`<span style="color:var(--danger);">-${h.penalty} XP</span>`:''}</div>`).join('')}</div><button class="btn back-btn" onclick="goHome()">🔙 بازگشت</button></div></div>
            <div id="settings-screen" style="display:none;"><div class="panel"><div style="color:var(--neon);font-size:16px;margin-bottom:12px;">⚙️ تنظیمات</div><div class="settings-section"><h3>🎨 شخصی‌سازی ظاهر</h3><div class="setting-row"><span>تم رنگی</span><select onchange="settings.theme=this.value;saveSettings();applyTheme();"><option value="blue" ${settings.theme==='blue'?'selected':''}>آبی نئونی</option><option value="gold" ${settings.theme==='gold'?'selected':''}>طلایی</option><option value="green" ${settings.theme==='green'?'selected':''}>سبز</option><option value="purple" ${settings.theme==='purple'?'selected':''}>بنفش</option></select></div><div class="setting-row"><span>🌙 حالت شب/روز ☀️</span><label class="toggle-switch"><input type="checkbox" ${settings.nightMode?'checked':''} onchange="settings.nightMode=this.checked;saveSettings();applyTheme();"><span class="toggle-slider"></span></label></div></div><div class="settings-section"><h3>🔊 صدا و بازخورد</h3><div class="setting-row"><span>صدای سیستم</span><label class="toggle-switch"><input type="checkbox" ${settings.sound?'checked':''} onchange="settings.sound=this.checked;saveSettings();"><span class="toggle-slider"></span></label></div><div class="setting-row"><span>ویبره</span><label class="toggle-switch"><input type="checkbox" ${settings.vibration?'checked':''} onchange="settings.vibration=this.checked;saveSettings();"><span class="toggle-slider"></span></label></div></div><div class="settings-section"><h3>🎯 سختی و انعطاف</h3><div class="setting-row"><span>حالت سختی</span><select onchange="settings.difficulty=this.value;saveSettings();"><option value="normal" ${settings.difficulty==='normal'?'selected':''}>عادی</option><option value="hard" ${settings.difficulty==='hard'?'selected':''}>سخت‌گیرانه</option><option value="survival" ${settings.difficulty==='survival'?'selected':''}>بقا</option></select></div><div class="setting-row"><span>جمعه‌ها</span><label class="toggle-switch"><input type="checkbox" ${settings.fridayRest?'checked':''} onchange="settings.fridayRest=this.checked;saveSettings();"><span class="toggle-slider"></span></label></div></div><div class="settings-section"><h3>💾 داده و امنیت</h3><button class="small-btn" onclick="exportData()">📥 Export داده</button><button class="small-btn" onclick="resetAllData()" style="background:var(--danger);margin-top:5px;">🔄 ریست کامل</button></div><button class="btn back-btn" onclick="goHome()" style="margin-top:15px;">🔙 بازگشت</button></div></div>
          `;
        }
        function showSettings(){ document.getElementById('main-screen').style.display='none'; document.getElementById('settings-screen').style.display='block'; }
        function showCreator(){ document.getElementById('main-screen').style.display='none'; document.getElementById('creator-screen').style.display='block'; }
        function showReport(){ document.getElementById('main-screen').style.display='none'; document.getElementById('report-screen').style.display='block'; render(); }
        function goHome(){ document.getElementById('main-screen').style.display='block'; document.getElementById('settings-screen').style.display='none'; document.getElementById('creator-screen').style.display='none'; document.getElementById('report-screen').style.display='none'; render(); }
        function saveName(){ const inp=document.getElementById('name-input'); if(inp&&inp.value.trim()){ state.user.name=inp.value.trim(); detectProfession(); updateTitle(); saveState(); render(); } }
        function exportData(){ const json=JSON.stringify(state,null,2); const blob=new Blob([json],{type:'application/json'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='vito-backup-'+getTodayJalali()+'.json'; a.click(); URL.revokeObjectURL(url); }
        function init(){ loadState(); loadSettings(); checkDailyRollover(); updateTitle(); render(); applyTheme(); setInterval(checkNotifications,30000); checkNotifications(); if(Notification&&Notification.permission==='default') Notification.requestPermission(); }
        init();
    </script>
</body>
</html>
