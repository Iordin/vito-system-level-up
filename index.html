<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>سیستم ویتو</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazir-code@v1.1.2/dist/font-face.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f; --surface: rgba(10,15,30,0.7); --surface2: #181820;
            --neon: #00ccff; --neon-dim: #006688; --gold: #d4af37; --danger: #ff3355;
            --success: #00e676; --text: #e0e0e0; --text-dim: #888; --radius: 12px;
            --glow: 0 0 15px rgba(0,204,255,0.3); --glow-gold: 0 0 20px rgba(212,175,55,0.4);
            --font-numbers: 'Vazir Code', 'Courier New', monospace;
            --font-headings: 'Vazirmatn', 'Tahoma', sans-serif;
            --font-text: 'Vazirmatn', 'Tahoma', sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            background: var(--bg);
            background-image: radial-gradient(ellipse at center, #111118 0%, #0a0a0f 100%);
            color: var(--text); font-family: var(--font-text);
            min-height: 100vh; min-height: 100dvh;
            display: flex; justify-content: center; align-items: center;
            padding: 10px; user-select: none; -webkit-user-select: none; overflow-x: hidden;
        }
        .app-container { width: 100%; max-width: 480px; position: relative; }
        .panel {
            background: var(--surface); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0,200,255,0.4); border-radius: var(--radius);
            padding: 18px; margin-bottom: 12px;
            box-shadow: 0 0 20px rgba(0,180,255,0.15), inset 0 0 20px rgba(0,180,255,0.05), 0 8px 32px rgba(0,0,0,0.4);
            position: relative; overflow: hidden;
        }
        .panel::before {
            content: ''; position: absolute; top:0; left:0; right:0; bottom:0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,180,255,0.03) 2px, rgba(0,180,255,0.03) 4px),
                        repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0,180,255,0.03) 2px, rgba(0,180,255,0.03) 4px);
            pointer-events: none;
        }
        .panel::after {
            content: ''; position: absolute; top:-50%; left:-50%; width:200%; height:200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(0,200,255,0.08) 0%, transparent 60%);
            pointer-events: none;
        }
        .panel.gold { border-color: rgba(212,175,55,0.4); box-shadow: var(--glow-gold); }
        .panel-header {
            font-family: var(--font-headings); font-weight: 700; font-size: 13px;
            color: var(--neon); letter-spacing: 2px; margin-bottom: 10px;
            display: flex; align-items: center; gap: 6px;
        }
        .panel-header::before { content: '▸'; font-size: 10px; }
        .btn {
            background: var(--surface2); border: 1px solid rgba(0,204,255,0.4);
            color: var(--neon); padding: 14px 30px; border-radius: 30px;
            font-size: 16px; font-family: var(--font-text); cursor: pointer;
            width: 100%; max-width: 300px; transition: all 0.3s; margin-bottom: 12px;
            letter-spacing: 1px; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:hover, .btn:active { background: var(--neon-dim); border-color: var(--neon); box-shadow: 0 0 25px rgba(0,204,255,0.5); color: #fff; }
        .btn.gold-btn { border-color: rgba(212,175,55,0.6); color: var(--gold); }
        .btn.gold-btn:hover { border-color: var(--gold); box-shadow: 0 0 25px rgba(212,175,55,0.5); }
        .small-btn { font-size: 10px; padding: 6px 14px; border-radius: 15px; background: var(--surface2); border: 1px solid rgba(255,255,255,0.2); color: #fff; cursor: pointer; font-family: var(--font-text); }
        .back-btn { background: transparent; border-color: rgba(255,255,255,0.2); color: var(--text-dim); max-width: 200px; padding: 10px 20px; font-size: 13px; }
        .logo-text {
            font-family: var(--font-headings); font-weight: 900; font-size: 28px;
            letter-spacing: 8px; color: var(--neon);
            text-shadow: 0 0 30px rgba(0,204,255,0.8), 0 0 60px rgba(0,204,255,0.4);
            animation: logoPulse 2s infinite;
        }
        @keyframes logoPulse { 0%,100% { text-shadow: 0 0 30px rgba(0,204,255,0.8), 0 0 60px rgba(0,204,255,0.4); } 50% { text-shadow: 0 0 50px rgba(0,204,255,1), 0 0 100px rgba(0,204,255,0.7); } }
        .stat-val, .xp-val, .level-num, .quest-xp, .vito-axis span { font-family: var(--font-numbers); font-weight: 400; letter-spacing: 2px; }
        .xp-bar { width:100%; height:8px; background:var(--surface2); border-radius:10px; overflow:hidden; margin:6px 0; }
        .xp-fill { height:100%; background:linear-gradient(90deg, var(--neon-dim), var(--neon)); border-radius:10px; transition: width 0.5s; box-shadow: 0 0 8px var(--neon); }
        .stats-row { display:flex; flex-wrap:wrap; gap:8px; margin:10px 0; }
        .stat-chip { background:var(--surface2); border:1px solid rgba(0,204,255,0.2); padding:6px 12px; border-radius:20px; font-size:12px; white-space:nowrap; }
        .stat-val { color:var(--neon); font-weight:bold; margin:0 4px; }
        .vito-axis { margin:6px 0; display:flex; align-items:center; gap:8px; font-size:12px; }
        .vito-axis .label { width:80px; text-align:left; }
        .vito-axis .bar { flex:1; height:6px; background:var(--surface2); border-radius:6px; overflow:hidden; }
        .vito-axis .fill { height:100%; background:var(--gold); border-radius:6px; transition:width 0.5s; }
        .collapsible-header { display:flex; justify-content:space-between; align-items:center; cursor:pointer; padding:8px 0; border-top:1px solid rgba(0,204,255,0.15); margin-top:6px; user-select:none; }
        .collapsible-header .arrow { transition:transform 0.3s; color:var(--neon); }
        .collapsible-header.open .arrow { transform:rotate(90deg); }
        .collapsible-body { display:none; padding:6px 0 12px; }
        .collapsible-body.open { display:block; }
        .quest-item { display:flex; align-items:center; justify-content:space-between; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.05); flex-wrap:wrap; gap:6px; }
        .quest-check { width:22px; height:22px; accent-color:var(--neon); transform:scale(1.2); cursor:pointer; }
        .quest-done { text-decoration:line-through; opacity:0.5; }
        .quest-xp { background:var(--neon-dim); color:#fff; padding:2px 8px; border-radius:12px; font-size:10px; }
        .quest-time { font-size:10px; color:var(--text-dim); background:var(--surface2); padding:2px 8px; border-radius:12px; }
        .skill-card { background:var(--surface2); border-radius:var(--radius); padding:12px; margin:8px 0; }
        .skill-bar { height:6px; background:#222; border-radius:6px; overflow:hidden; margin:4px 0; }
        .skill-fill { height:100%; background:var(--neon); border-radius:6px; }
        .toast-container { position:fixed; top:15px; left:50%; transform:translateX(-50%); z-index:9999; display:flex; flex-direction:column; gap:8px; pointer-events:none; }
        .toast { background:var(--surface); border:1px solid var(--neon); color:var(--neon); padding:10px 20px; border-radius:20px; font-size:13px; box-shadow:var(--glow); animation:toastIn 0.4s ease, toastOut 0.4s ease 3s forwards; pointer-events:auto; }
        .toast.danger { border-color:var(--danger); color:var(--danger); box-shadow:0 0 15px rgba(255,50,80,0.4); }
        .toast.gold { border-color:var(--gold); color:var(--gold); box-shadow:var(--glow-gold); }
        @keyframes toastIn { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
        @keyframes toastOut { to { opacity:0; transform:translateY(-10px); } }
        .settings-section { margin-bottom: 20px; }
        .settings-section h3 { font-family: var(--font-headings); font-size: 14px; color: var(--gold); margin-bottom: 10px; border-bottom: 1px solid rgba(212,175,55,0.2); padding-bottom: 5px; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; font-size: 13px; }
        .setting-row select, .setting-row input[type="range"] { background: var(--surface2); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 5px 10px; border-radius: 15px; font-family: var(--font-text); }
        .toggle-switch { position: relative; width: 50px; height: 26px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: 0.3s; border-radius: 26px; }
        .toggle-slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: white; transition: 0.3s; border-radius: 50%; }
        .toggle-switch input:checked + .toggle-slider { background-color: var(--neon); }
        .toggle-switch input:checked + .toggle-slider:before { transform: translateX(24px); }
        .creator-text { line-height: 2.2; font-size: 14px; color: var(--text-dim); text-align: justify; padding: 5px 0; }
        .main-menu-buttons { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 12px; }
        #system-break-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100000; display: none; flex-direction: column; justify-content: center; align-items: center; pointer-events: none; }
        #system-break-overlay .glitch-text { font-family: var(--font-numbers); font-size: 18px; color: var(--neon); text-align: center; line-height: 2; letter-spacing: 3px; animation: glitchSkew 0.3s infinite; }
        @keyframes glitchSkew { 0% { transform: skew(0deg); } 25% { transform: skew(2deg); } 50% { transform: skew(-2deg); } 75% { transform: skew(1deg); } 100% { transform: skew(0deg); } }
        #system-break-overlay .gold-final { font-family: var(--font-headings); font-weight: 900; font-size: 26px; color: var(--gold); text-shadow: 0 0 40px var(--gold); text-align: center; animation: goldPulse 2s infinite; display: none; }
        @keyframes goldPulse { 0%,100% { text-shadow: 0 0 40px var(--gold); } 50% { text-shadow: 0 0 80px var(--gold), 0 0 120px #fff; } }
        #system-break-particles { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:100001; display:none; }
        .gold-particle { position: absolute; width: 4px; height: 4px; background: var(--gold); border-radius: 50%; animation: particleRise 4s ease-out forwards; }
        @keyframes particleRise { 0% { opacity:1; transform: translateY(100vh) scale(1); } 100% { opacity:0; transform: translateY(-100px) scale(0); } }
    </style>
</head>
<body>
    <div class="app-container" id="app"></div>
    <div class="toast-container" id="toasts"></div>
    <div id="system-break-overlay"><div class="glitch-text" id="glitch-output"></div><div class="gold-final" id="gold-message"></div></div>
    <div id="system-break-particles"></div>
    <script src="achievements.js"></script>

    <script>
        const DEFAULT_QUESTS = [

            { id:'sunlight', name:'آفتاب ۱۰+ دقیقه', xp:10, stat:'spirit', vito:['mentalHealth'], days:'all', notifyTime:'07:00', completed:false, streak:0, keywords:['آفتاب','خورشید'] },
            { id:'study', name:'مطالعه (ساعتی)', xp:25, stat:'knowledge', vito:['science'], days:'all', notifyTime:'09:00', completed:false, streak:0, hoursTarget:5, hoursDone:0, maxHours:10, keywords:['مطالعه','درس','کتاب'] },

            { id:'explosive_pushup', name:'شنای انفجاری', xp:30, stat:'power', vito:['physicalHealth'], days:'odd', notifyTime:'', completed:false, streak:0, keywords:['انفجاری'] }

        const PROFESSION_DB = [
            { name:'بوکسور', keywords:['بوکس','شادو','کیسه بوکس','مشت','رینگ','اسپارینگ'], stats:['speed','power','endurance'], vito:['physicalHealth'], weight:0 },
            { name:'کشتی‌گیر', keywords:['کشتی','زیرگیری','خاک','فن','تاتامی','پل'], stats:['power','endurance'], vito:['physicalHealth'], weight:0 },
            { name:'بدنساز', keywords:['بدنسازی','عضله','وزنه','دمبل','پرس سینه','اسکات','مکمل','پروتئین'], stats:['power','endurance'], vito:['physicalHealth'], weight:0 },
            { name:'دونده', keywords:['دو','ماراتن','سرعت','دویدن','اینتروال'], stats:['speed','endurance'], vito:['physicalHealth'], weight:0 },
            { name:'شناگر', keywords:['شنا','استخر','آب','کرال','قورباغه','غواصی'], stats:['endurance','speed'], vito:['physicalHealth'], weight:0 },
            { name:'فوتبالیست', keywords:['فوتبال','توپ','گل','پاس','دریبل','شوت'], stats:['speed','endurance'], vito:['physicalHealth'], weight:0 },
            { name:'یوگی', keywords:['یوگا','مراقبه','آسانا','مدیتیشن','تنفس'], stats:['spirit','endurance'], vito:['mentalHealth','mindset'], weight:0 },
            { name:'نویسنده', keywords:['نوشتن','داستان','رمان','قلم','کتاب','تایپ','مقاله'], stats:['knowledge','spirit'], vito:['mindset'], weight:0 },
            { name:'برنامه‌نویس', keywords:['کد','برنامه','گیت','الگوریتم','پایتون','JS','API','HTML','CSS'], stats:['knowledge'], vito:['science','mindset'], weight:0 },
            { name:'مترجم', keywords:['ترجمه','زبان','واژه','انگلیسی','فارسی','آلمانی','فرانسه'], stats:['knowledge'], vito:['science'], weight:0 },
            { name:'معلم', keywords:['تدریس','کلاس','درس','دانش‌آموز','استاد','آموزش'], stats:['knowledge','spirit'], vito:['science','mindset'], weight:0 },
            { name:'فروشنده', keywords:['فروش','مشتری','تخفیف','قرارداد','بازاریابی'], stats:['knowledge'], vito:['finance','mindset'], weight:0 },
            { name:'کارآفرین', keywords:['استارتاپ','بیزینس','سرمایه','طرح','کسب و کار'], stats:['knowledge','spirit'], vito:['finance','mindset'], weight:0 },
            { name:'موسیقی‌دان', keywords:['موسیقی','گیتار','پیانو','ساز','نت','آهنگ','خوانندگی'], stats:['spirit'], vito:['mindset'], weight:0 },
            { name:'آشپز', keywords:['آشپزی','غذا','رسپی','قابلمه','پخت'], stats:['spirit','knowledge'], vito:['physicalHealth'], weight:0 },
            { name:'پزشک', keywords:['پزشکی','درمان','بیمار','دارو','جراحی'], stats:['knowledge'], vito:['physicalHealth','science'], weight:0 },
            { name:'محقق', keywords:['تحقیق','پژوهش','آزمایشگاه','مقاله','علمی'], stats:['knowledge'], vito:['science'], weight:0 },
            { name:'عکاس', keywords:['عکاسی','دوربین','لنز','کادر','نور','فتوگرافی'], stats:['spirit'], vito:['mindset'], weight:0 },
            { name:'طراح گرافیک', keywords:['طراحی','گرافیک','فتوشاپ','لوگو','برند','UI','UX'], stats:['knowledge','spirit'], vito:['mindset'], weight:0 },
            { name:'مهندس', keywords:['مهندسی','ساختمان','نقشه','محاسبات','طراحی فنی'], stats:['knowledge'], vito:['science'], weight:0 }
        ];
        const MYTH_TITLES = [
            { combo:'power+spirit', titles:['اژدهافکن','شیردل','رستم دستان','آرس','گیلگمش'] },
            { combo:'power+knowledge', titles:['ارتشتار خردمند','جنگجوی خردمند','ابوالهول','آتنا'] },
            { combo:'speed+spirit', titles:['سروش بیدار','بادپا','نیکه','شاهین‌نشین','سایه نینجا','کمان آرتمیس'] },
            { combo:'endurance+spirit', titles:['کوه مراقبه','آیرون‌مایند','اشک ققنوس','آیین مهر','دل الماس'] },
            { combo:'power+endurance', titles:['پیلتن','ببر بیان','گلادیاتور','اسپارتی','تافته‌رگ','هرکول'] },
            { combo:'knowledge+spirit', titles:['جمشیدجام','فره کیانی','موبد راز','کیمیاگر','حلقه افلاطون','چشم میمیر','اودین'] },
            { combo:'speed+power', titles:['تیغ سام','آخیلیس','باد شمشیر','مشت شمال'] },
            { combo:'speed+endurance', titles:['آشیل پایدار','رانده گرگ','گردباد'] },
            { combo:'endurance+knowledge', titles:['اودیسئوس'] },
            { combo:'all_high', titles:['مونارک','سیستم‌شکن','آخرین لول','رستم دستان','جمشید'] },
            { combo:'all_max', titles:['ویتوی کامل','پوچی','خالق','ابدی'] }
        ];
        let ACHIEVEMENTS = [];
        if (typeof FULL_ACHIEVEMENTS !== 'undefined') { ACHIEVEMENTS = FULL_ACHIEVEMENTS; }
        const STORAGE_KEY = 'vito_system';
        const SETTINGS_KEY = 'vito_settings';
        let state = {
            user: { name:'', confirmedProfession:'', detectedProfession:'', level:1, xp:0, awakeningLevel:0, professionLevel:0, title:'' },
            stats: { power:0, speed:0, endurance:0, knowledge:0, spirit:0 },
            vito: { finance:0, mentalHealth:0, physicalHealth:0, mindset:0, science:0 },
            quests: [], skills: [], history: [], lastOpened:'', streak:0, achievements:[], titlesUnlocked:[],
            totalQuestCompletions:{}, restDaysUsed:[], sickLeaveActive:false, sickLeaveRemaining:0,
            sickLeaveUsage:[], systemBroken:false, badge:''
        };
        let settings = {
            theme:'blue', glow:'medium', bg:'dark', nightMode:false,
            sound:true, notificationSound:true, vibration:true, music:false,
            difficulty:'normal', fridayRest:true, graceDay:false,
            autoBackup:false, keepBadge:true,
            morningNotification:true, eveningNotification:true, penaltyWarning:true, achievementPopup:true,
            simpleMode:false, devMode:false
        };
        function loadState(){ const raw=localStorage.getItem(STORAGE_KEY); if(raw){ try{ const p=JSON.parse(raw); state=deepMerge(state,p); }catch(e){} } if(!state.quests.length) state.quests=JSON.parse(JSON.stringify(DEFAULT_QUESTS)); if(!state.totalQuestCompletions) state.totalQuestCompletions={}; if(!state.restDaysUsed) state.restDaysUsed=[]; if(!state.sickLeaveUsage) state.sickLeaveUsage=[]; }
        function loadSettings(){ const raw=localStorage.getItem(SETTINGS_KEY); if(raw){ try{ const p=JSON.parse(raw); settings=deepMerge(settings,p); }catch(e){} } }
        function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
        function saveSettings(){ localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); }
        function deepMerge(target, source){ const o={...target}; for(const k in source){ if(source[k]&&typeof source[k]==='object'&&!Array.isArray(source[k])) o[k]=deepMerge(target[k]||{},source[k]); else o[k]=source[k]; } return o; }
        function getTodayJalali(){ return new Intl.DateTimeFormat('fa-IR-u-ca-persian',{year:'numeric',month:'2-digit',day:'2-digit',timeZone:'Asia/Tehran'}).format(new Date()).replace(/[\/]/g,'-'); }
        function getDayType(d){ const p=d.split('-'); const j=jalaliToGregorian(+p[0],+p[1],+p[2]); const pd=(j.getDay()+1)%7; if(pd===6) return'friday'; return pd%2===0?'even':'odd'; }
        function jalaliToGregorian(jy,jm,jd){ const jy2=jy-979; const days=jd+(jm<=7?(jm-1)*31:(jm-1)*30+6)+Math.floor(jy2*365.25)-79; const g=new Date(2000,0,1); g.setDate(g.getDate()+days); return g; }
        function getRank(l){ if(l>=70) return'S'; if(l>=50) return'A'; if(l>=35) return'B'; if(l>=20) return'C'; if(l>=10) return'D'; return'E'; }
        function xpForLevel(l){ return Math.floor(100*Math.pow(l,1.3)); }
        function xpForNextLevel(){ return xpForLevel(state.user.level+1); }
